<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VOID DOMINION — Solar System</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;height:100%;background:#00010a;overflow:hidden;
  font-family:'Exo 2',sans-serif;color:#d0eeff;
  touch-action:none;-webkit-tap-highlight-color:transparent;
  user-select:none;overscroll-behavior:none;
}
canvas#cv{display:block;position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;touch-action:none;}

/* HUD */
#hud{position:fixed;top:0;left:0;right:0;height:50px;z-index:10;background:rgba(0,1,10,0.96);border-bottom:1px solid rgba(0,229,255,0.15);display:flex;align-items:center;padding:0 10px;gap:6px;pointer-events:all;}
.hl{font-family:'Orbitron',monospace;font-size:11px;font-weight:900;letter-spacing:2px;color:#00e5ff;text-shadow:0 0 8px rgba(0,229,255,0.6);padding-right:8px;border-right:1px solid rgba(0,229,255,0.15);flex-shrink:0;}
.bc{display:flex;align-items:center;gap:4px;padding-right:8px;border-right:1px solid rgba(0,229,255,0.15);flex-shrink:0;overflow:hidden;}
.bci{font-family:'Orbitron',monospace;font-size:8px;letter-spacing:1px;color:rgba(0,229,255,0.4);cursor:pointer;white-space:nowrap;transition:color .2s;}
.bci:hover{color:#00e5ff;}
.bci.active{color:#fff;pointer-events:none;}
.bcs{font-size:8px;color:rgba(0,229,255,0.2);}
.hres{display:flex;gap:6px;padding-right:8px;border-right:1px solid rgba(0,229,255,0.15);}
.hr{display:flex;flex-direction:column;align-items:center;}
.hrl{font-size:6px;letter-spacing:1px;color:rgba(255,255,255,0.3);text-transform:uppercase;}
.hrv{font-family:'Orbitron',monospace;font-size:10px;font-weight:700;}
.hrv.cr{color:#ffc400;}.hrv.mn{color:#78909c;}.hrv.en{color:#80cbc4;}
.hright{margin-left:auto;display:flex;gap:5px;flex-shrink:0;}
.hbtn{padding:5px 9px;font-family:'Orbitron',monospace;font-size:8px;letter-spacing:1px;border-radius:2px;border:1px solid rgba(0,229,255,0.3);background:transparent;color:#00e5ff;cursor:pointer;text-transform:uppercase;white-space:nowrap;}

/* System banner */
#banner{position:fixed;top:58px;left:50%;transform:translateX(-50%);z-index:10;text-align:center;pointer-events:none;}
.bn{font-family:'Orbitron',monospace;font-size:13px;font-weight:900;letter-spacing:3px;color:#fff;text-shadow:0 0 10px rgba(0,229,255,0.4);}
.bt{font-size:9px;letter-spacing:2px;color:rgba(0,229,255,0.4);text-transform:uppercase;margin-top:2px;}

/* Zoom */
#zc{position:fixed;right:12px;bottom:55px;z-index:10;display:flex;flex-direction:column;gap:6px;pointer-events:all;}
.zb{width:44px;height:44px;background:rgba(0,1,10,0.94);border:1px solid rgba(0,229,255,0.2);border-radius:3px;color:#00e5ff;font-size:20px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;}
.zb.fit{font-size:9px;letter-spacing:1px;}

/* Bottom */
#bb{position:fixed;bottom:0;left:0;right:0;height:44px;z-index:10;background:rgba(0,1,10,0.96);border-top:1px solid rgba(0,229,255,0.15);display:flex;align-items:center;padding:0 12px;gap:10px;pointer-events:none;}
.bbi{display:flex;align-items:center;gap:4px;font-size:9px;color:rgba(255,255,255,0.35);}
.bbd{width:7px;height:7px;border-radius:50%;}
.bbz{margin-left:auto;font-family:'Orbitron',monospace;font-size:9px;color:rgba(0,229,255,0.35);letter-spacing:1px;}

/* Planet panel - slides from right */
#planet-panel{
  position:fixed;right:0;top:50px;bottom:44px;width:240px;z-index:15;
  background:rgba(0,1,15,0.96);border-left:1px solid rgba(0,229,255,0.18);
  transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;overflow:hidden;pointer-events:all;
}
#planet-panel.open{transform:translateX(0);}
/* planet action buttons */
.pp-action-wrap{display:flex;flex-direction:column;gap:6px;margin:8px 14px 0;}
.pp-act-btn{padding:9px;font-family:'Orbitron',monospace;font-size:9px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;border:none;border-radius:2px;
  cursor:pointer;transition:all .2s;color:#fff;width:100%;}
.pp-act-btn.land{background:linear-gradient(90deg,rgba(0,200,230,.9),rgba(124,58,237,.9));}
.pp-act-btn.scout{background:linear-gradient(90deg,rgba(124,58,237,.85),rgba(80,0,180,.85));}
.pp-act-btn.attack{background:linear-gradient(90deg,rgba(255,23,68,.9),rgba(180,0,40,.9));}
.pp-act-btn.colonize{background:linear-gradient(90deg,rgba(0,200,100,.9),rgba(0,130,60,.9));}
.pp-act-btn:active{transform:scale(.97);}
.pp-status-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:2px;
  font-family:'Orbitron',monospace;font-size:8px;letter-spacing:1px;margin:6px 14px 0;width:fit-content;}
.pp-status-badge.home{background:rgba(255,196,0,.1);border:1px solid rgba(255,196,0,.3);color:#ffc400;}
.pp-status-badge.mine{background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.3);color:#00e676;}
.pp-status-badge.neutral{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.4);}
.pp-status-badge.enemy{background:rgba(255,23,68,.08);border:1px solid rgba(255,23,68,.3);color:#ff4466;}
.pp-def-info{margin:4px 14px 0;padding:7px 10px;background:rgba(255,23,68,.06);border:1px solid rgba(255,23,68,.18);border-radius:2px;}
.pp-def-row{display:flex;justify-content:space-between;font-size:8px;color:rgba(255,255,255,.4);margin-bottom:2px;}
.pp-def-row:last-child{margin:0;}
.pp-def-row span:last-child{font-family:'Orbitron',monospace;font-size:8px;}
.pp-header{
  padding:12px 14px 10px;border-bottom:1px solid rgba(0,229,255,0.1);
  flex-shrink:0;
}
.pp-close{position:absolute;top:10px;right:10px;background:none;border:none;color:rgba(0,229,255,0.4);font-size:16px;cursor:pointer;line-height:1;}
.pp-icon{font-size:32px;text-align:center;margin-bottom:6px;}
.pp-name{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:#fff;letter-spacing:1px;margin-bottom:2px;}
.pp-type{font-size:9px;color:rgba(0,229,255,0.45);letter-spacing:2px;text-transform:uppercase;}
.pp-body{flex:1;overflow-y:auto;padding:10px 14px;scrollbar-width:thin;scrollbar-color:rgba(0,229,255,0.15) transparent;}
.pp-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05);}
.pp-row:last-child{border:none;}
.pp-label{font-size:9px;letter-spacing:1px;color:rgba(255,255,255,0.35);text-transform:uppercase;}
.pp-val{font-family:'Orbitron',monospace;font-size:10px;color:#fff;}
.pp-res{display:flex;flex-direction:column;gap:4px;margin:10px 0;}
.pp-res-row{display:flex;justify-content:space-between;align-items:center;}
.pp-res-label{font-size:8px;color:rgba(255,255,255,0.35);text-transform:uppercase;}
.pp-res-bar{flex:1;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;margin:0 8px;overflow:hidden;}
.pp-res-fill{height:100%;border-radius:2px;}
.pp-res-val{font-family:'Orbitron',monospace;font-size:8px;}
.pp-enter-btn{
  margin:10px 14px;padding:10px;
  font-family:'Orbitron',monospace;font-size:10px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;
  background:linear-gradient(90deg,rgba(0,200,230,.85),rgba(124,58,237,.85));
  color:#fff;border:none;border-radius:2px;cursor:pointer;
  box-shadow:0 4px 16px rgba(0,180,210,.25);
  transition:all .2s;flex-shrink:0;
}
.pp-enter-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,180,210,.4);}
.pp-home-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(255,196,0,0.1);border:1px solid rgba(255,196,0,0.3);border-radius:2px;padding:3px 8px;font-family:'Orbitron',monospace;font-size:8px;color:#ffc400;margin-bottom:8px;}

/* Toasts */
#toasts{position:fixed;top:58px;left:50%;transform:translateX(-50%);z-index:20;display:flex;flex-direction:column;align-items:center;gap:4px;pointer-events:none;}
.toast{padding:6px 14px;background:rgba(0,1,15,0.97);border:1px solid rgba(0,229,255,0.2);border-radius:2px;font-family:'Orbitron',monospace;font-size:9px;letter-spacing:1px;white-space:nowrap;animation:tIn .2s ease,tOut .3s ease 2.5s forwards;}
.toast.ok{border-color:rgba(0,230,118,0.5);color:#00e676;}
.toast.err{border-color:rgba(255,23,68,0.5);color:#ff1744;}
.toast.inf{border-color:rgba(0,229,255,0.4);color:#00e5ff;}
@keyframes tIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
@keyframes tOut{to{opacity:0}}

/* Loading */
#loadscr{position:fixed;inset:0;z-index:100;background:#00010a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.lt{font-family:'Orbitron',monospace;font-size:clamp(20px,5vw,34px);font-weight:900;letter-spacing:3px;color:#00e5ff;text-shadow:0 0 20px rgba(0,229,255,0.7);animation:lp 2s ease-in-out infinite;}
@keyframes lp{0%,100%{opacity:.7}50%{opacity:1}}
.lbw{width:180px;height:3px;background:rgba(0,229,255,0.1);border-radius:2px;overflow:hidden;}
.lb{height:100%;width:0%;background:linear-gradient(90deg,#00e5ff,#7c3aed);transition:width .4s;border-radius:2px;}
.ltx{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:3px;color:rgba(0,229,255,0.4);text-transform:uppercase;}

/* Transition */
#zt{position:fixed;inset:0;z-index:90;background:radial-gradient(circle at 50% 50%,rgba(0,229,255,0.2) 0%,rgba(0,1,10,1) 65%);opacity:0;pointer-events:none;transition:opacity .5s;}
#zt.show{opacity:1;pointer-events:all;}

/* ══ ATTACK MODAL ══ */
#atk-modal{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.87);backdrop-filter:blur(6px);display:none;align-items:flex-end;justify-content:center;}
#atk-modal.open{display:flex;}
.am-box{background:rgba(0,2,18,.99);border:1px solid rgba(0,229,255,.18);border-radius:4px 4px 0 0;width:100%;max-width:480px;max-height:82vh;overflow-y:auto;animation:slideUp .28s ease;padding-bottom:20px;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.am-hdr{padding:14px 16px 10px;border-bottom:1px solid rgba(0,229,255,.08);display:flex;align-items:center;gap:10px;}
.am-icon{font-size:22px;}.am-title{font-family:'Orbitron',monospace;font-size:13px;font-weight:900;color:#fff;letter-spacing:1px;}
.am-sub{font-size:8px;color:rgba(0,229,255,.4);letter-spacing:1px;margin-top:2px;}
.am-x{margin-left:auto;background:none;border:none;color:rgba(0,229,255,.4);font-size:18px;cursor:pointer;padding:4px;}
/* Power bar */
.pow-compare{display:flex;gap:6px;padding:10px 14px;align-items:center;}
.pow-side{flex:1;background:rgba(0,5,20,.8);border-radius:2px;padding:8px;text-align:center;}
.pow-lbl{font-size:7px;letter-spacing:1px;color:rgba(255,255,255,.3);font-family:'Orbitron',monospace;margin-bottom:3px;}
.pow-val{font-family:'Orbitron',monospace;font-size:18px;font-weight:900;}
.pow-vs{font-family:'Orbitron',monospace;font-size:11px;color:rgba(0,229,255,.3);}
/* Ship rows */
.am-sec{padding:10px 14px 0;}
.am-sec-t{font-family:'Orbitron',monospace;font-size:8px;letter-spacing:2px;color:rgba(0,229,255,.35);text-transform:uppercase;margin-bottom:8px;}
.ship-sel-row{display:flex;align-items:center;gap:10px;padding:8px 10px;background:rgba(0,5,20,.8);border:1px solid rgba(0,229,255,.1);border-radius:2px;margin-bottom:6px;cursor:pointer;transition:all .2s;}
.ship-sel-row.active{border-color:#00e5ff;background:rgba(0,229,255,.07);}
.ship-sel-row:active{opacity:.8;}
.ssr-icon{font-size:20px;width:26px;text-align:center;flex-shrink:0;}
.ssr-name{flex:1;font-family:'Orbitron',monospace;font-size:10px;font-weight:700;color:#fff;}
.ssr-cnt{font-family:'Orbitron',monospace;font-size:12px;color:#00e5ff;}
.ssr-atk{font-size:8px;color:rgba(255,80,80,.7);font-family:'Orbitron',monospace;}
/* Qty */
.qty-row{display:flex;align-items:center;gap:8px;padding:10px 14px 0;}
.qty-lbl{font-family:'Orbitron',monospace;font-size:8px;color:rgba(0,229,255,.4);flex-shrink:0;}
.qty-btn{padding:8px 14px;background:rgba(0,229,255,.1);border:1px solid rgba(0,229,255,.2);border-radius:2px;color:#00e5ff;font-family:'Orbitron',monospace;font-size:16px;cursor:pointer;}
.qty-in{flex:1;padding:8px;background:rgba(0,5,20,.9);border:1px solid rgba(0,229,255,.2);border-radius:2px;color:#00e5ff;font-family:'Orbitron',monospace;font-size:15px;text-align:center;}
/* Confirm */
.am-confirm{width:calc(100%-28px);margin:12px 14px 0;padding:13px;font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border:none;border-radius:2px;cursor:pointer;color:#fff;}
.am-confirm.do-scout{background:linear-gradient(90deg,rgba(124,58,237,.9),rgba(80,0,180,.9));}
.am-confirm.do-attack{background:linear-gradient(90deg,rgba(255,23,68,.9),rgba(180,0,40,.9));}
.am-confirm:disabled{opacity:.35;cursor:not-allowed;}
/* Battle result */
.battle-result{margin:10px 14px 0;padding:14px;border-radius:2px;}
.br-win{background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.25);}
.br-loss{background:rgba(255,23,68,.06);border:1px solid rgba(255,23,68,.2);}
.br-title{font-family:'Orbitron',monospace;font-size:14px;font-weight:900;letter-spacing:2px;margin-bottom:8px;}
.br-win .br-title{color:#00e676;}.br-loss .br-title{color:#ff4466;}
.br-row{font-size:9px;color:rgba(255,255,255,.5);padding:3px 0;font-family:'Orbitron',monospace;}
</style>
</head>
<body>
<div id="loadscr">
  <div class="lt">VOID DOMINION</div>
  <div class="lbw"><div class="lb" id="lbar"></div></div>
  <div class="ltx" id="ltxt">Loading system...</div>
</div>

<canvas id="cv"></canvas>
<div id="zt"></div>

<!-- ATTACK/SCOUT MODAL -->
<div id="atk-modal">
  <div class="am-box" id="am-content"></div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="hl">VD</div>
  <div class="bc">
    <span class="bci" onclick="goUniverse()">UNI</span>
    <span class="bcs">›</span>
    <span class="bci" id="bc-gal" onclick="goGalaxy()">GAL</span>
    <span class="bcs">›</span>
    <span class="bci active" id="bc-sys">SYSTEM</span>
  </div>
  <div class="hres">
    <div class="hr"><div class="hrl">CR</div><div class="hrv cr" id="hcr">0</div></div>
    <div class="hr"><div class="hrl">MIN</div><div class="hrv mn" id="hmn">0</div></div>
    <div class="hr"><div class="hrl">ENE</div><div class="hrv en" id="hen">0</div></div>
  </div>
  <div class="hright"><button class="hbtn" onclick="goHome()" style="border-color:rgba(0,229,255,0.4);">&#127968;</button>
    <button class="hbtn" onclick="goGalaxy()">&#8592; BACK</button>
  </div>
</div>

<!-- Banner -->
<div id="banner">
  <div class="bn" id="sys-name">-</div>
  <div class="bt" id="sys-type">-</div>
</div>

<!-- Zoom -->
<div id="zc">
  <button class="zb" id="zin">+</button>
  <button class="zb" id="zout">&#8722;</button>
  <button class="zb fit" id="zfit">FIT</button>
</div>

<!-- Bottom -->
<div id="bb">
  <div class="bbi"><div class="bbd" style="background:#ffc400;box-shadow:0 0 4px #ffc400"></div>Home Planet</div>
  <div class="bbi"><div class="bbd" style="background:rgba(0,229,255,0.6)"></div>Planet</div>
  <div class="bbi"><div class="bbd" style="background:rgba(255,255,255,0.15)"></div>Uninhabited</div>
  <div class="bbz" id="bzoom">1.00x</div>
</div>

<!-- Planet Detail Panel -->
<div id="planet-panel">
  <div class="pp-header">
    <button class="pp-close" onclick="closePanel()">&#10005;</button>
    <div class="pp-icon" id="pp-icon">&#127756;</div>
    <div class="pp-name" id="pp-name">-</div>
    <div class="pp-type" id="pp-type">-</div>
  </div>
  <div class="pp-body">
    <div id="pp-home-badge" class="pp-home-badge" style="display:none;">&#11088; HOME PLANET</div>
    <div class="pp-res" id="pp-res-bars"></div>
    <div class="pp-row"><span class="pp-label">Atmosphere</span><span class="pp-val" id="pp-atm">-</span></div>
    <div class="pp-row"><span class="pp-label">Temperature</span><span class="pp-val" id="pp-temp">-</span></div>
    <div class="pp-row"><span class="pp-label">Gravity</span><span class="pp-val" id="pp-grav">-</span></div>
    <div class="pp-row"><span class="pp-label">Moons</span><span class="pp-val" id="pp-moons">-</span></div>
    <div class="pp-row"><span class="pp-label">Status</span><span class="pp-val" id="pp-status">-</span></div>
  </div>
  <div id="pp-action-section"></div>
</div>

<!-- Toasts -->
<div id="toasts"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SB = supabase.createClient(

);

// ════ PLANET TYPES ════
const PLANET_TYPES = [
  { type:'Rocky',    icon:'&#129704;', col:[180,140,100], atm:'Thin',   temp:'Cold',    grav:'0.7g' },
  { type:'Gas Giant',icon:'&#127756;', col:[220,160,80],  atm:'Dense',  temp:'Extreme', grav:'2.5g' },
  { type:'Ice',      icon:'&#10052;',  col:[160,210,255], atm:'Frozen', temp:'Freezing',grav:'0.6g' },

const ATM = ['None','Thin','Breathable','Dense','Thick','Toxic','Frozen','Dry'];
const TEMPS = ['Freezing','Very Cold','Cold','Cool','Mild','Warm','Hot','Very Hot','Burning','Extreme'];
const GRAVS = ['0.3g','0.5g','0.6g','0.7g','0.8g','0.9g','0.95g','1.0g','1.1g','1.3g','1.5g','2.0g','2.5g'];

// ════ STATE ════
let CV=null,CTX=null;
let W=0,H=0;
let systemData=null;
let planets=[];
let homePlanetIdx=0;
let selPlanet=null;
let camX=0,camY=0,camS=1;

let sunX=0,sunY=0,sunR=0;
const MAX_ORB_R = 380; // max orbit radius in world units

// ════ UTILS ════
const $=id=>document.getElementById(id);
function setLoad(p,t){$('lbar').style.width=p+'%';$('ltxt').textContent=t;}
function toast(m,type='inf'){const el=document.createElement('div');el.className='toast '+type;el.textContent=m;$('toasts').appendChild(el);setTimeout(()=>el.remove(),3200);}
function fmt(n){if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return''+n;}
function delay(ms){return new Promise(r=>setTimeout(r,ms));}
function mkRng(seed){let s=Math.abs(seed)%2147483647||1;return()=>{s=s*16807%2147483647;return(s-1)/2147483646;};}
function hashStr(str){let h=5381;for(let i=0;i<str.length;i++)h=(h*33^str.charCodeAt(i))>>>0;return h;}
function lerp(a,b,t){return a+(b-a)*t;}

// ════ BUILD PLANETS ════
function buildPlanets(seed, count){
  const rng=mkRng(seed);
  const list=[];

  // No two same types in a row, max 2 same types total
  const typeCounts={};

  for(let i=0;i<count;i++){
    // Pick random type with constraints
    let typeObj;
    let tries=0;
    do{
      typeObj=PLANET_TYPES[Math.floor(rng()*PLANET_TYPES.length)];
      tries++;
    }while(tries<20 && (typeCounts[typeObj.type]||0)>=2);

    typeCounts[typeObj.type]=(typeCounts[typeObj.type]||0)+1;

    const ry=RESOURCE_YIELDS[typeObj.type]||RESOURCE_YIELDS.Rocky;
    const crYield=ry.cr[0]+Math.floor(rng()*(ry.cr[1]-ry.cr[0]+1));
    const mnYield=ry.mn[0]+Math.floor(rng()*(ry.mn[1]-ry.mn[0]+1));
    const enYield=ry.en[0]+Math.floor(rng()*(ry.en[1]-ry.en[0]+1));

    list.push({
      id:i,
      ...typeObj,
      // Orbit properties
      orbitR: 70 + (count>1?(i/(count-1)):0.5)*(MAX_ORB_R-70) + (rng()-.5)*20,
      orbitSpeed: 0.0004/(1+i*.15) * (rng()>.5?1:-1),
      orbitAngle: rng()*Math.PI*2,
      orbitTilt: (rng()-.5)*0.08,
      // Planet size
      size: typeObj.type==='Gas Giant' ? 14+rng()*8 : 5+rng()*8,
      // Axial tilt for visual
      tilt: rng()*0.3,
      // Resources per tick
      crYield, mnYield, enYield,
      // Atmosphere, temp, grav, moons
      atm: ATM[Math.floor(rng()*ATM.length)],
      temp: TEMPS[Math.floor(rng()*TEMPS.length)],
      grav: GRAVS[Math.floor(rng()*GRAVS.length)],
      moons: Math.floor(rng()*5),
      // Status
      colonized: false,
      isHome: false,
    });
  }
  return list;
}

// ════ CAMERA ════
function w2s(wx,wy){return{x:wx*camS+camX,y:wy*camS+camY};}
function s2w(sx,sy){return{x:(sx-camX)/camS,y:(sy-camY)/camS};}
function clampS(){camS=Math.max(0.2,Math.min(4.0,camS));}

function fitAll(){
  if(!CV)return;
  const maxR=MAX_ORB_R+50;
  const sz=Math.min(W,H-100)*0.86;
  camS=sz/(maxR*2);
  clampS();
  // Center sun
  camX=W/2-sunX*camS;
  camY=H/2-sunY*camS;
}

// ════ DRAW ════
function draw(ts){
  if(!CTX)return;
  CTX.setTransform(1,0,0,1,0,0);
  CTX.clearRect(0,0,W,H);
  CTX.fillStyle='#00010a';
  CTX.fillRect(0,0,W,H);

  // Space dust
  drawSpaceDust(ts);

  CTX.save();
  CTX.translate(camX,camY);
  CTX.scale(camS,camS);

  // Draw orbit rings first
  for(const p of planets) drawOrbitRing(p,ts);

  // Draw sun
  drawSun(ts);

  // Draw planets
  for(const p of planets) drawPlanet(p,ts);

  CTX.restore();

  // Draw fleet travel animations (in world space)
  if(fleetMissions.length>0){
    CTX.save();
    CTX.translate(camX,camY);
    CTX.scale(camS,camS);
    drawFleetMissions(ts);
    CTX.restore();
  }

  // Draw battle particles (screen space)
  if(battleParticles.length>0) drawBattleParticles();

  $('bzoom').textContent=camS.toFixed(2)+'x';
}

function drawSpaceDust(ts){
  // Static stars
  const rng2=mkRng(42);
  for(let i=0;i<200;i++){
    const x=rng2()*W, y=rng2()*H;
    const r=rng2()*.8+.1;
    const o=rng2()*.3+.05;
    CTX.beginPath();CTX.arc(x,y,r,0,Math.PI*2);
    CTX.fillStyle=`rgba(200,220,255,${o})`;CTX.fill();
  }
}

function drawSun(ts){
  const t=ts*.001;
  const {x:sx,y:sy}=w2s(sunX,sunY); // not used inside save block
  // We're inside CTX.save() translate block, so use world coords
  const col=systemData?.starCol||'255,200,80';
  const cr=systemData?.cr||255, cg=systemData?.cg||200, cb=systemData?.cb||80;
  const colStr=`${cr},${cg},${cb}`;
  const pulse=.5+.5*Math.sin(t*.8);
  const sr=sunR;

  // Outer corona
  const corona=CTX.createRadialGradient(sunX,sunY,0,sunX,sunY,sr*6);
  corona.addColorStop(0,`rgba(${colStr},${.15+pulse*.08})`);
  corona.addColorStop(.4,`rgba(${colStr},${.06+pulse*.03})`);
  corona.addColorStop(1,'rgba(0,0,0,0)');
  CTX.fillStyle=corona;CTX.beginPath();CTX.arc(sunX,sunY,sr*6,0,Math.PI*2);CTX.fill();

  // Main glow
  const glow=CTX.createRadialGradient(sunX,sunY,0,sunX,sunY,sr*2.5);
  glow.addColorStop(0,`rgba(${colStr},${.6+pulse*.3})`);
  glow.addColorStop(.5,`rgba(${colStr},${.25+pulse*.1})`);
  glow.addColorStop(1,'rgba(0,0,0,0)');
  CTX.fillStyle=glow;CTX.beginPath();CTX.arc(sunX,sunY,sr*2.5,0,Math.PI*2);CTX.fill();

  // Core
  const core=CTX.createRadialGradient(sunX,sunY,0,sunX,sunY,sr);
  core.addColorStop(0,'rgba(255,255,255,0.97)');
  core.addColorStop(.3,`rgba(${colStr},0.9)`);
  core.addColorStop(.7,`rgba(${cr},${Math.max(0,cg-60)},0,0.8)`);
  core.addColorStop(1,`rgba(${cr},0,0,0.5)`);
  CTX.fillStyle=core;CTX.beginPath();CTX.arc(sunX,sunY,sr,0,Math.PI*2);CTX.fill();

  // Solar flares
  for(let i=0;i<6;i++){
    const a=(i/6)*Math.PI*2+t*.2;
    const len=sr*(1.2+.5*Math.sin(t*1.3+i*1.1));
    CTX.beginPath();
    CTX.moveTo(sunX+Math.cos(a)*sr*.7,sunY+Math.sin(a)*sr*.7);
    CTX.lineTo(sunX+Math.cos(a)*len,sunY+Math.sin(a)*len);
    CTX.strokeStyle=`rgba(${colStr},${.3+pulse*.15})`;
    CTX.lineWidth=sr*.08;CTX.stroke();
  }

  // Sun label
  if(camS>0.4){
    CTX.textAlign='center';CTX.textBaseline='top';
    CTX.font=`bold ${Math.min(12,10/camS)}px Orbitron,monospace`;
    CTX.fillStyle=`rgba(255,220,100,0.7)`;
    CTX.fillText(systemData?.name||'Star',sunX,sunY+sr*1.4+3/camS);
  }
}

function drawOrbitRing(p,ts){
  const pulse=.5+.5*Math.sin(ts*.001+p.id);
  CTX.beginPath();
  CTX.ellipse(sunX,sunY,p.orbitR,p.orbitR*(1-p.orbitTilt*.3),0,0,Math.PI*2);
  const isSelOrHome=selPlanet?.id===p.id||p.isHome;
  CTX.strokeStyle=isSelOrHome
    ?`rgba(0,229,255,${.15+pulse*.08})`
    :`rgba(0,229,255,${.05+pulse*.03})`;
  CTX.lineWidth=isSelOrHome?(.8/camS):(.4/camS);
  CTX.stroke();
}

function drawPlanet(p,ts){
  // Update orbit angle
  p.orbitAngle+=p.orbitSpeed;
  const px=sunX+Math.cos(p.orbitAngle)*p.orbitR;
  const py=sunY+Math.sin(p.orbitAngle)*p.orbitR*(1-p.orbitTilt*.3);
  p.screenX=px; p.screenY=py; // store for hit test

  const pulse=.5+.5*Math.sin(ts*.001+p.id*2.3);
  const [cr,cg,cb]=p.col;
  const col=`${cr},${cg},${cb}`;
  const sz=p.size;

  CTX.save();
  CTX.translate(px,py);

  // Atmosphere glow
  const atm=CTX.createRadialGradient(0,0,sz*.6,0,0,sz*2.2);
  atm.addColorStop(0,`rgba(${col},${.25+pulse*.1})`);
  atm.addColorStop(.6,`rgba(${col},${.08+pulse*.04})`);
  atm.addColorStop(1,'rgba(0,0,0,0)');
  CTX.fillStyle=atm;CTX.beginPath();CTX.arc(0,0,sz*2.2,0,Math.PI*2);CTX.fill();

  // Planet body gradient
  const body=CTX.createRadialGradient(-sz*.3,-sz*.3,sz*.1,0,0,sz);
  body.addColorStop(0,`rgba(255,255,255,0.3)`);
  body.addColorStop(.2,`rgba(${cr+40},${cg+40},${cb+40},0.9)`);
  body.addColorStop(.7,`rgba(${col},1)`);
  body.addColorStop(1,`rgba(${Math.max(0,cr-60)},${Math.max(0,cg-60)},${Math.max(0,cb-60)},1)`);
  CTX.fillStyle=body;CTX.beginPath();CTX.arc(0,0,sz,0,Math.PI*2);CTX.fill();

  // Gas giant rings
  if(p.type==='Gas Giant'){
    CTX.save();CTX.scale(1,.35);
    CTX.beginPath();CTX.arc(0,0,sz*1.7,0,Math.PI*2);
    CTX.strokeStyle=`rgba(${col},.45)`;CTX.lineWidth=sz*.4;CTX.stroke();
    CTX.beginPath();CTX.arc(0,0,sz*1.95,0,Math.PI*2);
    CTX.strokeStyle=`rgba(${col},.2)`;CTX.lineWidth=sz*.2;CTX.stroke();
    CTX.restore();
  }

  // Moons
  if(p.moons>0&&camS>0.6){
    for(let m=0;m<Math.min(p.moons,3);m++){
      const ma=ts*.0008*(1+m*.3)+m*2.1;
      const mr=sz*2.2+m*sz*.8;
      CTX.beginPath();CTX.arc(Math.cos(ma)*mr,Math.sin(ma)*mr,sz*.18,0,Math.PI*2);
      CTX.fillStyle=`rgba(200,200,220,0.7)`;CTX.fill();
    }
  }

  // Home planet ring
  if(p.isHome){
    CTX.beginPath();CTX.arc(0,0,sz*1.5,0,Math.PI*2);
    CTX.strokeStyle=`rgba(255,196,0,${.5+pulse*.3})`;CTX.lineWidth=1.5/camS;CTX.stroke();
    CTX.beginPath();CTX.arc(0,0,sz*2,0,Math.PI*2);
    CTX.strokeStyle=`rgba(255,196,0,${.18+pulse*.1})`;CTX.lineWidth=.7/camS;CTX.stroke();
  }

  // Selected ring
  if(selPlanet&&selPlanet.id===p.id){
    CTX.beginPath();CTX.arc(0,0,sz*1.6,0,Math.PI*2);
    CTX.strokeStyle=`rgba(255,255,255,${.6+pulse*.3})`;CTX.lineWidth=1.5/camS;CTX.stroke();
    CTX.setLineDash([3/camS,2/camS]);
    CTX.beginPath();CTX.arc(0,0,sz*2.1,0,Math.PI*2);
    CTX.strokeStyle=`rgba(255,255,255,${.2+pulse*.1})`;CTX.lineWidth=.6/camS;CTX.stroke();
    CTX.setLineDash([]);
  }

  // Planet ownership ring
  const ring=typeof getPlanetRing==='function'?getPlanetRing(p):null;
  if(ring){
    const ringCols={green:[0,230,118],red:[255,23,68],gray:[150,150,150]};
    const rc=ringCols[ring]||ringCols.gray;
    CTX.beginPath();CTX.arc(0,0,sz*1.9,0,Math.PI*2);
    CTX.strokeStyle=`rgba(${rc[0]},${rc[1]},${rc[2]},${.6+pulse*.25})`;
    CTX.lineWidth=2.5/camS;CTX.stroke();
    // Outer glow
    CTX.beginPath();CTX.arc(0,0,sz*2.2,0,Math.PI*2);
    CTX.strokeStyle=`rgba(${rc[0]},${rc[1]},${rc[2]},${.15+pulse*.08})`;
    CTX.lineWidth=4/camS;CTX.stroke();
  }

  // Label
  if(camS>0.45){
    CTX.textAlign='center';CTX.textBaseline='top';
    const fs=Math.min(10,8/camS);
    CTX.font=`bold ${fs}px Orbitron,monospace`;
    CTX.fillStyle=p.isHome?`rgba(255,196,0,.85)`:`rgba(255,255,255,${.55+pulse*.12})`;
    CTX.fillText('P'+(p.id+1)+': '+p.type,0,sz*1.2+3/camS);
  }

  CTX.restore();
}

// ════ HIT TEST ════
function planetAt(wx,wy){
  let best=null,bd=Infinity;
  for(const p of planets){
    if(!p.screenX)continue;
    const d=Math.hypot(p.screenX-wx,p.screenY-wy);
    const hit=Math.max(p.size*2.5,18/camS);
    if(d<hit&&d<bd){bd=d;best=p;}
  }
  return best;
}

// ════ COORD GENERATOR ════
function genPlanetCoord(sysId, planetId){
  const h = Math.abs((sysId*31+planetId)*2654435761)>>>0;
  const x = (h%900)+100;
  const y = ((h>>10)%900)+100;
  return x+':'+y;
}

// ════ PLANET STATUS SYSTEM ════
// planetStatus stored in localStorage: {planetKey: 'home'|'mine'|'neutral'|'conquered'}
function getPlanetKey(p){ return 'vd_ps_'+userId+'_'+systemData?.id+'_'+p.id; }
function getPlanetStatus(p){
  if(p.isHome) return 'home';
  const saved = localStorage.getItem(getPlanetKey(p));
  return saved||'neutral';
}
function setPlanetStatus(p, status){
  localStorage.setItem(getPlanetKey(p), status);
}

window.closePanel = function closePanel(keepSel){
  $('planet-panel').classList.remove('open');
  if(!keepSel) selPlanet=null;
}

// ════ PLANET ACTIONS ════
function savePlanetData(){
  if(!selPlanet) return;
  sessionStorage.setItem('vd_planet',JSON.stringify({
    id:selPlanet.id,
    name:'Planet '+(selPlanet.id+1),
    type:selPlanet.type,
    icon:selPlanet.icon,
    col:selPlanet.col,
    crYield:selPlanet.crYield,
    mnYield:selPlanet.mnYield,
    enYield:selPlanet.enYield,
    isHome:selPlanet.isHome,
    moons:selPlanet.moons,
    atm:selPlanet.atm,
    temp:selPlanet.temp,
    grav:selPlanet.grav,
    systemName:systemData?.name||'Unknown',
    galaxyName:systemData?.galaxyName||'Unknown',
    status: getPlanetStatus(selPlanet),
  }));
}

window.enterPlanet=function(){
  if(!selPlanet)return;
  savePlanetData();
  $('zt').classList.add('show');
  setTimeout(()=>window.location.href='planet.html',550);
};

window.doScout=function(){
  if(!selPlanet) return;
  const fleetRaw=localStorage.getItem('vd_fleet_'+userId);
  const fleetData=fleetRaw?JSON.parse(fleetRaw):{fleet:{},buildQueue:[],resources:{}};
  const fleet=fleetData.fleet||{};

  if(!(fleet.probe>0)){
    toast('No Probe! Build one in Shipyard (Lv1 needed).','err');
    return;
  }
  // Consume 1 probe
  fleet.probe=Math.max(0,(fleet.probe)-1);
  fleetData.fleet=fleet;
  localStorage.setItem('vd_fleet_'+userId,JSON.stringify(fleetData));

  const status=getPlanetStatus(selPlanet);
  const isEnemy=status==='enemy';
  const defVal=isEnemy?Math.floor(200+Math.random()*400):Math.floor(10+Math.random()*50);
  const shipCount=isEnemy?Math.floor(defVal/8)+Math.floor(Math.random()*6):0;

  toast('Probe launched! Gathering intel...','inf');
  closePanel();

  setTimeout(()=>{
    // Save permanent scout intel for this planet
    const scoutKey='vd_scout_'+userId+'_sys'+(systemData?.id||0)+'_p'+selPlanet.id;
    const scoutInfo={
      defPower:defVal,
      enemyFleet:shipCount>0?'~'+shipCount+' ships':'None detected',
      buildings:isEnemy?'Fortified (CC + Turrets)':'None',
      resources:isEnemy?'~'+Math.floor(defVal*12)+' CR estimated':'Low',
      scoutedAt:new Date().toISOString(),
    };
    localStorage.setItem(scoutKey,JSON.stringify(scoutInfo));

    toast('Intel received: Defense Power '+defVal,'ok');
    if(isEnemy) toast('Enemy notified of scouting!','inf');

    saveReport({
      type:'scout',
      targetName:'Planet '+(selPlanet.id+1)+': '+selPlanet.type,
      systemName:systemData?.name||'',
      defPower:defVal,
      enemyFleet:scoutInfo.enemyFleet,
      buildings:scoutInfo.buildings,
      resources:scoutInfo.resources,
      planetType:selPlanet?.type||'Unknown',
      targetStatus:status,
    });
    // Reopen panel — now shows confirmed intel
    openPanel(selPlanet);
  },2500);
};

// ══ MULTI-SELECT ATTACK STATE ══
// atkSelected = {shipId: qty} — multiple ships selected
let atkSelected={}, atkTargetDef=0, atkTargetPlanet=null, atkLocked=false;

function calcTotalAtk(){
  let total=0;
  for(const [id,qty] of Object.entries(atkSelected)){
    const s=SHIP_DEFS.find(x=>x.id===id);
    total+=(s?.atk||0)*qty;
  }
  return total;
}

function setPlanetRing(p,color){

window.doAttack=function(){
  if(!selPlanet) return;
  const fleetRaw=localStorage.getItem('vd_fleet_'+userId);
  const fleet=fleetRaw?JSON.parse(fleetRaw).fleet||{}:{};
  const combatShips=SHIP_DEFS.filter(s=>s.atk>0&&(fleet[s.id]||0)>0);
  if(!combatShips.length){toast('No combat ships! Build ships in Fleet.','err');return;}
  const status=getPlanetStatus(selPlanet);
  const scoutKey='vd_scout_'+userId+'_sys'+(systemData?.id||0)+'_p'+selPlanet.id;
  const scoutData=JSON.parse(localStorage.getItem(scoutKey)||'null');
  const defVal=scoutData?scoutData.defPower:(status==='enemy'?Math.floor(200+Math.random()*400):Math.floor(10+Math.random()*50));
  atkTargetDef=defVal;
  atkSelected={};
  atkTargetPlanet=selPlanet; // SAVE before any close
  atkLocked=false;
  closePanel(true);
  renderAtkModal(fleet,combatShips,defVal);
  $('atk-modal').classList.add('open');
};

function renderAtkModal(fleet,combatShips,defVal){
  const myAtk=calcTotalAtk();
  const hasSelection=Object.keys(atkSelected).length>0;
  const atkColor=!hasSelection?'rgba(255,255,255,.35)':myAtk>=defVal?'#00e676':'#ff4466';

  // Build summary of selected ships
  let selSummary='';
  if(hasSelection){
    selSummary=Object.entries(atkSelected).map(([id,qty])=>{
      const s=SHIP_DEFS.find(x=>x.id===id);
      return `<span style="font-family:'Orbitron',monospace;font-size:8px;color:#fff;margin-right:8px;">${qty}x ${s?.n||id}</span>`;
    }).join('');
  }

  $('am-content').innerHTML=`
    <div class="am-hdr">
      <div class="am-icon">&#9876;&#65039;</div>
      <div>
        <div class="am-title">LAUNCH ATTACK</div>
        <div class="am-sub">Planet ${(atkTargetPlanet?.id||0)+1}: ${atkTargetPlanet?.type||''} — ${systemData?.name||''}</div>
      </div>
      <button class="am-x" onclick="closeAtkModal()">&#10005;</button>
    </div>

    <!-- Power comparison -->
    <div class="pow-compare">
      <div class="pow-side" style="border:1px solid rgba(255,68,68,.2)">
        <div class="pow-lbl">YOUR ATK</div>
        <div class="pow-val" style="color:${atkColor}">${hasSelection?myAtk:'—'}</div>
      </div>
      <div class="pow-vs">VS</div>
      <div class="pow-side" style="border:1px solid rgba(0,229,255,.15)">
        <div class="pow-lbl">EST. DEF</div>
        <div class="pow-val" style="color:#ffc400">${defVal}</div>
      </div>
    </div>

    ${hasSelection?`<div style="padding:4px 14px 0;font-size:8px;color:rgba(0,229,255,.5);font-family:'Orbitron',monospace;">FLEET: ${selSummary}</div>`:''}

    <!-- Multi-select ship list -->
    <div class="am-sec">
      <div class="am-sec-t">Select Ships (tick multiple)</div>
      ${combatShips.map(s=>{
        const isChecked=!!atkSelected[s.id];
        const qty=atkSelected[s.id]||0;
        const max=fleet[s.id]||0;
        return `
        <div class="ship-sel-row ${isChecked?'active':''}" onclick="atkToggle('${s.id}',${max},${defVal})">
          <!-- Checkbox -->
          <div style="width:22px;height:22px;border:2px solid ${isChecked?'#00e5ff':'rgba(255,255,255,.2)'};border-radius:3px;background:${isChecked?'rgba(0,229,255,.2)':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;color:#00e5ff;transition:all .15s;">
            ${isChecked?'&#10003;':''}
          </div>
          <div class="ssr-icon">${s.icon}</div>
          <div class="ssr-name">${s.n}</div>
          <div class="ssr-cnt">x${max}</div>
          <div class="ssr-atk">ATK ${s.atk}</div>
        </div>
        ${isChecked?`
        <!-- Qty row for this ship -->
        <div style="display:flex;align-items:center;gap:6px;padding:4px 14px 8px;background:rgba(0,229,255,.03);">
          <span style="font-family:'Orbitron',monospace;font-size:8px;color:rgba(0,229,255,.4);flex-shrink:0;">SEND:</span>
          <button class="qty-btn" style="padding:5px 12px;" onclick="event.stopPropagation();atkQtyChg('${s.id}',-1,${max},${defVal})">−</button>
          <input class="qty-in" style="padding:5px;" type="number" value="${qty}" min="1" max="${max}"
            onchange="event.stopPropagation();atkQtySet2('${s.id}',parseInt(this.value),${max},${defVal})"
            onclick="event.stopPropagation()">
          <button class="qty-btn" style="padding:5px 12px;" onclick="event.stopPropagation();atkQtyChg('${s.id}',1,${max},${defVal})">+</button>
          <button class="qty-btn" style="padding:5px 10px;font-size:9px;letter-spacing:1px;" onclick="event.stopPropagation();atkQtyChg('${s.id}',${max},${max},${defVal})">ALL</button>
          <span style="font-size:8px;color:rgba(255,80,80,.7);font-family:'Orbitron',monospace;margin-left:4px;">ATK:${s.atk*qty}</span>
        </div>`:''}`
      }).join('')}
    </div>

    <button class="am-confirm do-attack" style="display:block;" id="atk-confirm-btn" ${!hasSelection?'disabled':''}>
      &#9876; LAUNCH ATTACK ${hasSelection?'(ATK:'+myAtk+')':''}
    </button>`;
  
  // Attach click listener after render — clone to wipe all old listeners
  requestAnimationFrame(()=>{
    const btn=document.getElementById('atk-confirm-btn');
    if(btn){

      btn.parentNode.replaceChild(fresh,btn);

function atkToggle(id,max,defVal){
  if(atkSelected[id]){
    delete atkSelected[id]; // deselect
  } else {
    atkSelected[id]=Math.max(1,Math.ceil(max/2)); // default: half
  }
  const fleetRaw=localStorage.getItem('vd_fleet_'+userId);
  const fleet=fleetRaw?JSON.parse(fleetRaw).fleet||{}:{};
  const combatShips=SHIP_DEFS.filter(s=>s.atk>0&&(fleet[s.id]||0)>0);
  renderAtkModal(fleet,combatShips,defVal);
}

function atkQtyChg(id,delta,max,defVal){
  if(!atkSelected[id]) return;
  if(delta===max){atkSelected[id]=max;}
  else{atkSelected[id]=Math.max(1,Math.min(max,(atkSelected[id]||1)+delta));}
  const fleetRaw=localStorage.getItem('vd_fleet_'+userId);
  const fleet=fleetRaw?JSON.parse(fleetRaw).fleet||{}:{};
  const combatShips=SHIP_DEFS.filter(s=>s.atk>0&&(fleet[s.id]||0)>0);
  renderAtkModal(fleet,combatShips,defVal);
}

function atkQtySet2(id,v,max,defVal){
  atkSelected[id]=Math.max(1,Math.min(max,v||1));
  const fleetRaw=localStorage.getItem('vd_fleet_'+userId);
  const fleet=fleetRaw?JSON.parse(fleetRaw).fleet||{}:{};
  const combatShips=SHIP_DEFS.filter(s=>s.atk>0&&(fleet[s.id]||0)>0);
  renderAtkModal(fleet,combatShips,defVal);
}

function closeAtkModal(){
  $('atk-modal').classList.remove('open');
  atkSelected={};
}

// ══ EXECUTE ATTACK (multi-ship) ══

function executeAtk(defVal){
  // Prevent double execution
  if(atkLocked){return;}
  
  const keys=Object.keys(atkSelected);
  if(!keys.length){toast('Tick karo ships pehle!','err');return;}
  if(!atkTargetPlanet){toast('No target! Select planet first.','err');return;}

  const fleetRaw=localStorage.getItem('vd_fleet_'+userId);
  const fleetData=fleetRaw?JSON.parse(fleetRaw):{fleet:{},buildQueue:[],resources:{}};
  const fleet=fleetData.fleet||{};

  for(const [id,qty] of Object.entries(atkSelected)){
    if((fleet[id]||0)<qty){
      toast('Not enough '+SHIP_DEFS.find(s=>s.id===id)?.n+'!','err');
      return;
    }
  }

  // LOCK to prevent double execution
  atkLocked=true;

  // Snapshot
  const shipsCopy=JSON.parse(JSON.stringify(atkSelected));
  const myAtk=Object.entries(shipsCopy).reduce((tot,[id,qty])=>
    tot+(SHIP_DEFS.find(s=>s.id===id)?.atk||0)*qty, 0);
  const totalShips=Object.values(shipsCopy).reduce((a,b)=>a+b,0);
  const tp=atkTargetPlanet; // use dedicated variable

  // Deduct ships
  for(const [id,qty] of Object.entries(shipsCopy)){
    fleet[id]=Math.max(0,(fleet[id]||0)-qty);
  }
  fleetData.fleet=fleet;
  localStorage.setItem('vd_fleet_'+userId,JSON.stringify(fleetData));

  // Close UI completely
  $('atk-modal').classList.remove('open');
  atkSelected={};
  $('planet-panel').classList.remove('open');
  // DON'T touch selPlanet — not needed anymore

  // Dominant ship color
  let domCol=[255,60,60];let maxA=0;
  for(const [id] of Object.entries(shipsCopy)){
    const s=SHIP_DEFS.find(x=>x.id===id);
    if(s&&s.atk>maxA){maxA=s.atk;domCol=s.col||[255,60,60];}
  }

  // Fleet animation
  const hp=planets.find(p=>p.isHome)||planets[0];
  const fx=hp?.screenX||0, fy=hp?.screenY||0;
  const tx2=tp?.screenX||100, ty2=tp?.screenY||100;
  const dist=Math.hypot(tx2-fx,ty2-fy);
  const dur=Math.max(2000,dist*30);

  toast('Fleet launched! '+totalShips+' ships en route...','inf');

  fleetMissions.push({
    id:Date.now(),
    fromX:fx,fromY:fy,toX:tx2,toY:ty2,
    startTime:Date.now(),duration:dur,
    qty:totalShips,type:'attack',shipCol:domCol,
    done:false,targetPlanet:tp,
    onArrival:function(){
      atkLocked=false; // unlock after battle
      resolveBattle(myAtk,defVal,shipsCopy,tp);
    },
  });

  // Fallback unlock after 30s
  setTimeout(()=>{atkLocked=false;},30000);
}

// ══ RESOLVE BATTLE (multi-ship) ══
function resolveBattle(myAtk,defVal,selectedShips,targetPlanet){
  const myPow=myAtk*(0.8+Math.random()*0.4);
  const enPow=defVal*(0.85+Math.random()*0.3);
  const won=myPow>enPow;

  // Build casualties summary
  const casualties=[];
  let totalSent=0;

  for(const [id,qty] of Object.entries(selectedShips)){
    const s=SHIP_DEFS.find(x=>x.id===id);
    const lost=won?Math.floor(qty*0.15):qty;
    const survived=won?qty-lost:0;
    totalSent+=qty;
    if(qty>0) casualties.push({name:s?.n||id,lost,survived});

    // Return surviving ships on win
    if(won&&survived>0){
      const fd=JSON.parse(localStorage.getItem('vd_fleet_'+userId)||'{}');
      fd.fleet=fd.fleet||{};
      fd.fleet[id]=(fd.fleet[id]||0)+survived;
      localStorage.setItem('vd_fleet_'+userId,JSON.stringify(fd));
    }
  }

  if(won){
    setPlanetStatus(targetPlanet,'conquered');
    targetPlanet.colonized=true;
    setPlanetRing(targetPlanet,'green');
    const totalLost=casualties.reduce((a,c)=>a+c.lost,0);
    toast('VICTORY! Planet '+(targetPlanet.id+1)+' captured! &#127942;','ok');
    if(totalLost>0) toast('Lost '+totalLost+' ships in battle','inf');
    toast('Send a Colonizer to claim it!','inf');
    startBattleAnimation(targetPlanet,true);
    saveReport({type:'attack',targetName:'Planet '+(targetPlanet.id+1)+': '+targetPlanet.type,systemName:systemData?.name||'',attackPower:Math.round(myPow),defPower:Math.round(enPow),outcome:'win',casualties});
    setTimeout(()=>openPanel(targetPlanet),900);
  } else {
    const status=getPlanetStatus(targetPlanet);
    setPlanetRing(targetPlanet,status==='enemy'?'red':'gray');
    toast('DEFEAT! All '+totalSent+' ships lost!','err');
    toast('Scout first to know exact defense strength.','inf');
    startBattleAnimation(targetPlanet,false);
    saveReport({type:'attack',targetName:'Planet '+(targetPlanet.id+1)+': '+targetPlanet.type,systemName:systemData?.name||'',attackPower:Math.round(myPow),defPower:Math.round(enPow),outcome:'loss',casualties});
    setTimeout(()=>closePanel(),1000);
  }
}

// ══ BATTLE ANIMATION (smoke/blast particles on planet) ══
let battleParticles=[];

function startBattleAnimation(targetPlanet,won){
  const px=targetPlanet.screenX, py=targetPlanet.screenY;
  const sz=targetPlanet.size||8;
  const count=won?40:20;
  
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=won?(0.3+Math.random()*1.2):(0.2+Math.random()*0.6);
    const col=won
      ?[255,Math.floor(100+Math.random()*100),0]  // orange/fire
      :[120,120,120]; // gray smoke for loss
    battleParticles.push({
      x:px+(Math.random()-.5)*sz*2,
      y:py+(Math.random()-.5)*sz*2,
      vx:Math.cos(angle)*speed,
      vy:Math.sin(angle)*speed-0.5,
      life:1.0,
      decay:0.015+Math.random()*0.02,
      r:2+Math.random()*(won?5:3),
      col,
      worldX:px,worldY:py, // store in screen coords
    });
  }
  
  // Screen shake for wins
  if(won){
    let shakes=0;
    const shakeInt=setInterval(()=>{
      if(shakes++>8){clearInterval(shakeInt);return;}
      const offsetX=(Math.random()-.5)*6;
      const offsetY=(Math.random()-.5)*6;
      if(CV){CV.style.transform=`translate(${offsetX}px,${offsetY}px)`;}
    },50);
    setTimeout(()=>{if(CV)CV.style.transform='';},500);
  }
}

function drawBattleParticles(){
  if(!battleParticles.length) return;
  battleParticles=battleParticles.filter(p=>p.life>0);
  for(const p of battleParticles){
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.02; // gravity
    p.life-=p.decay;
    const alpha=Math.max(0,p.life);
    CTX.beginPath();
    CTX.arc(p.x,p.y,p.r*alpha,0,Math.PI*2);
    CTX.fillStyle=`rgba(${p.col[0]},${p.col[1]},${p.col[2]},${alpha})`;
    CTX.fill();
  }
}

window.doColonize=function(){
  if(!selPlanet)return;
  const fleetRaw=localStorage.getItem('vd_fleet_'+userId);

function zoom(f){
  const cx=W/2,cy=H/2;
  const wx=(cx-camX)/camS,wy=(cy-camY)/camS;
  camS*=f;clampS();camX=cx-wx*camS;camY=cy-wy*camS;
}

// ════ SAVE REPORT ════
function saveReport(report){
  const key='vd_reports_'+userId;
  const raw=localStorage.getItem(key);
  const reports=raw?JSON.parse(raw):[];

// ════ FLEET TRAVEL ANIMATIONS ════
let fleetMissions=[]; // active fleet animations on canvas

function addFleetMission(fromPlanet, toPlanet, qty, type){
  // Get research speed bonus
  const bonuses=JSON.parse(localStorage.getItem('vd_bonuses_'+userId)||'{}');
  const speedBonus=(bonuses.fleetSpeedBonus||0)+(bonuses.warpBonus||0);
  // Distance in world units
  const dist=Math.hypot(toPlanet.screenX-fromPlanet.screenX, toPlanet.screenY-fromPlanet.screenY);
  // Time = distance * base_time_factor / speed_bonus
  const baseFactor=80; // px per second
  const duration=Math.max(3,(dist/baseFactor)*(1-speedBonus));
  fleetMissions.push({
    id:Date.now(),
    fromX:fromPlanet.screenX, fromY:fromPlanet.screenY,
    toX:toPlanet.screenX, toY:toPlanet.screenY,
    startTime:Date.now(),
    duration:duration*1000,
    qty, type, // 'friendly','attack'
    done:false,
    targetPlanet:toPlanet,
  });
  toast('Fleet launched! ETA: '+Math.ceil(duration)+'s','inf');
}

function drawFleetMissions(ts){
  const now=Date.now();
  for(let i=fleetMissions.length-1;i>=0;i--){
    const m=fleetMissions[i];
    if(m.done){fleetMissions.splice(i,1);continue;}
    
    const prog=Math.min(1,(now-m.startTime)/m.duration);
    const x=m.fromX+(m.toX-m.fromX)*prog;
    const y=m.fromY+(m.toY-m.fromY)*prog;
    const sc=m.shipCol||[0,229,255];
    const isAtk=m.type==='attack';
    
    // ── TRAIL (multiple dots fading) ──
    for(let t=0;t<6;t++){
      const tp=Math.max(0,prog-(t*0.025));
      const tx=m.fromX+(m.toX-m.fromX)*tp;
      const ty=m.fromY+(m.toY-m.fromY)*tp;
      const alpha=(1-t/6)*0.35;
      const r=(5-t*0.5)/camS;
      CTX.beginPath();CTX.arc(tx,ty,r,0,Math.PI*2);
      CTX.fillStyle=`rgba(${sc[0]},${sc[1]},${sc[2]},${alpha})`;
      CTX.fill();
    }
    
    // ── MAIN SHIP DOT ──
    CTX.save();CTX.translate(x,y);
    
    // Outer glow
    CTX.beginPath();CTX.arc(0,0,7/camS,0,Math.PI*2);
    CTX.fillStyle=`rgba(${sc[0]},${sc[1]},${sc[2]},0.15)`;CTX.fill();
    
    // Main dot
    CTX.beginPath();CTX.arc(0,0,4/camS,0,Math.PI*2);
    CTX.fillStyle=`rgb(${sc[0]},${sc[1]},${sc[2]})`;CTX.fill();
    
    // Bright center
    CTX.beginPath();CTX.arc(0,0,2/camS,0,Math.PI*2);
    CTX.fillStyle='rgba(255,255,255,0.95)';CTX.fill();
    
    // Quantity label
    CTX.textAlign='center';CTX.textBaseline='bottom';
    CTX.font=`bold ${9/camS}px sans-serif`;
    // Shadow
    CTX.fillStyle='rgba(0,0,0,0.8)';
    CTX.fillText('x'+m.qty,1/camS,(-7/camS)+1/camS);
    // Text
    CTX.fillStyle='#ffffff';
    CTX.fillText('x'+m.qty,0,-7/camS);
    
    CTX.restore();
    
    // ── CHECK ARRIVAL ──
    if(prog>=1){
      m.done=true;
      if(m.onArrival){
        try{m.onArrival();}catch(e){console.error('onArrival error:',e);}
      }
    }
  }
}

// ════ INPUT ════
function setupInput(){
  CV.addEventListener('touchstart',e=>{
    e.preventDefault();
    if(e.touches.length===1){
      isDrag=true;hasMoved=false;
      t0touch={x:e.touches[0].clientX,y:e.touches[0].clientY};
      dragSX=e.touches[0].clientX;dragSY=e.touches[0].clientY;
      camSX=camX;camSY=camY;
    }else{isDrag=false;t0touch=null;}
  },{passive:false});
  CV.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(!isDrag||e.touches.length!==1)return;
    const dx=e.touches[0].clientX-dragSX,dy=e.touches[0].clientY-dragSY;
    if(Math.abs(dx)+Math.abs(dy)>4)hasMoved=true;
    camX=camSX+dx;camY=camSY+dy;
  },{passive:false});
  CV.addEventListener('touchend',e=>{
    e.preventDefault();
    if(isDrag&&!hasMoved&&e.changedTouches.length===1&&t0touch)
      onTap(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
    isDrag=false;t0touch=null;
  },{passive:false});
  CV.addEventListener('touchcancel',e=>{e.preventDefault();isDrag=false;t0touch=null;},{passive:false});

  CV.addEventListener('mousedown',e=>{
    isDrag=true;hasMoved=false;
    dragSX=e.clientX;dragSY=e.clientY;camSX=camX;camSY=camY;e.preventDefault();
  });
  window.addEventListener('mousemove',e=>{
    if(!isDrag)return;
    const dx=e.clientX-dragSX,dy=e.clientY-dragSY;
    if(Math.abs(dx)+Math.abs(dy)>3)hasMoved=true;
    camX=camSX+dx;camY=camSY+dy;e.preventDefault();
  });
  window.addEventListener('mouseup',e=>{
    if(isDrag&&!hasMoved)onTap(e.clientX,e.clientY);
    isDrag=false;
  });

  $('zin').onclick=()=>zoom(1.3);
  $('zout').onclick=()=>zoom(0.77);
  $('zfit').onclick=fitAll;
}

function onTap(sx,sy){
  // Close panel if tapping outside
  const w=s2w(sx,sy);
  const p=planetAt(w.x,w.y);
  if(p){ openPanel(p); }
  else { closePanel(); }
}

// ════ RESIZE ════
function resize(){
  W=window.innerWidth;H=window.innerHeight;
  CV.width=W;CV.height=H;
}

// ════ RENDER LOOP ════
function startLoop(){
  if(raf)return;
  (function loop(ts){raf=requestAnimationFrame(loop);draw(ts);})();
}

// ════ INIT ════
async function init(){
  setLoad(10,'Connecting...');await delay(100);

  let session=null;
  try{const r=await SB.auth.getSession();session=r.data.session;}catch(e){}
  if(!session?.user){window.location.href='https://amitmukherjee626-rgb.github.io/void-dominion/';return;}
  userId=session.user.id;

  // If no system data in sessionStorage, we came here directly
  // Redirect to game.html instead of hanging
  const quickSysCheck = sessionStorage.getItem('vd_system');
  if(!quickSysCheck){
    // Try to use home system as default — don't hang
    // Just set a default and continue, or go home
    window.location.href='game.html';
    return;
  }

  setLoad(30,'Loading profile...');await delay(100);
  const {data:prof}=await SB.from('players').select('*').eq('id',session.user.id).maybeSingle();
  $('hcr').textContent=fmt(prof?.credits||0);
  $('hmn').textContent=fmt(prof?.minerals||0);
  $('hen').textContent=fmt(prof?.energy||0);

  // Get system data
  setLoad(50,'Loading system data...');await delay(100);
  let sysRaw=sessionStorage.getItem('vd_system');
  if(!sysRaw){
    // Fallback default
    const seed=hashStr(session.user.id);
    systemData={
      id:0,name:'Alpha Centauri',starType:'Yellow Star',
      planets:7,resources:'Abundant',
      cr:255,cg:220,cb:80,
      isHome:true,
      galaxyName:'Home Galaxy',
    };
  } else {
    systemData=JSON.parse(sysRaw);
  }

  // Update UI
  $('sys-name').textContent=systemData.name;
  $('sys-type').textContent=systemData.starType;
  $('bc-sys').textContent=systemData.name.toUpperCase();
  const galRaw=sessionStorage.getItem('vd_galaxy');
  const galName=galRaw?JSON.parse(galRaw).name:'Galaxy';
  $('bc-gal').textContent=galName.length>10?galName.substring(0,10)+'...':galName.toUpperCase();

  // Build planets
  setLoad(70,'Generating planets...');await delay(100);
  let sysSeed, planetCount;
  try{
    sysSeed=hashStr((systemData.name||'default')+(systemData.id||0));
    planetCount=Math.max(2,Math.min(12,parseInt(systemData.planets)||7));
    planets=buildPlanets(sysSeed,planetCount);
  }catch(e){
    console.error('buildPlanets error:',e);
    // Fallback: generate simple planets
    planets=[];
    for(let i=0;i<6;i++){
      const t=PLANET_TYPES[i%PLANET_TYPES.length];
      const ry=RESOURCE_YIELDS[t.type];
      planets.push({id:i,...t,orbitR:80+i*55,orbitSpeed:0.0004/(1+i*.15),
        orbitAngle:i*(Math.PI*2/6),orbitTilt:0,size:t.type==='Gas Giant'?18:8,
        crYield:ry.cr[0],mnYield:ry.mn[0],enYield:ry.en[0],
        atm:'Unknown',temp:'Unknown',grav:'1.0g',moons:0,colonized:false,isHome:false});
    }
  }

  // ═══ HOME PLANET FIX ═══
  // Home planet = ONLY the planet saved in vd_home_planet_{userId}
  // Set ONCE when player first logs in - never changes
  const savedHomePlanet = JSON.parse(localStorage.getItem('vd_home_planet_'+userId)||'null');
  const savedHomeSysId = localStorage.getItem('vd_home_sysid_'+userId);
  
  // Is this the home system?
  const isHomeSystem = savedHomeSysId 
    ? (systemData?.id?.toString() === savedHomeSysId || systemData?.name === savedHomeSysId)
    : systemData?.isHome === true; // fallback for first visit
  
  // First time setup - save home system ID permanently
  if(systemData?.isHome && !savedHomeSysId){
    const sysKey = systemData.id?.toString() || systemData.name;
    localStorage.setItem('vd_home_sysid_'+userId, sysKey);
  }
  
  // Mark home planet ONLY in home system, ONLY planet index 0
  planets.forEach(p => p.isHome = false);
  homePlanetIdx = -1;
  
  if(isHomeSystem){
    planets[0].isHome = true;
    homePlanetIdx = 0;
  }

  // Sun position = center of canvas world
  sunX=0; sunY=0;
  // Sun size based on star type
  const starSizes={
    'Red Dwarf':22,'Yellow Star':28,'Blue Giant':38,
    'White Dwarf':18,'Neutron Star':14,'Binary Star':32
  };
  sunR=starSizes[systemData.starType]||28;

  // Canvas
  setLoad(90,'Rendering...');
  CV=document.getElementById('cv');CTX=CV.getContext('2d');
  W=window.innerWidth;H=window.innerHeight;
  CV.width=W;CV.height=H;
  window.addEventListener('resize',resize);

  // Camera — fit all orbits centered
  fitAll();

  setupInput();
  setLoad(100,'Ready!');await delay(300);

  const ls=$('loadscr');
  ls.style.transition='opacity .4s';ls.style.opacity='0';
  setTimeout(()=>ls.style.display='none',450);

  startLoop();
  toast(systemData.name+' — '+planets.length+' planets detected','ok');
}

init();
</script>
