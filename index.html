<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VOID DOMINION</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════
   CORE
══════════════════════════════════════════════ */
:root {
  --bg:#00020c; --deep:#010a1e;
  --c1:#00e5ff; --c2:#7c3aed; --c3:#ff1744;
  --gold:#ffc400; --green:#00e676; --orange:#ff6d00;
  --line:rgba(0,229,255,0.14);
  --glass:rgba(0,5,20,0.88);
  --fh:'Orbitron',monospace;
  --fb:'Exo 2',sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:var(--bg);color:#d0eeff;font-family:var(--fb);overflow:hidden;-webkit-tap-highlight-color:transparent;user-select:none;}
canvas{display:block;}

/* ══════════════════════════════════════════════
   STARFIELD
══════════════════════════════════════════════ */
#stars{position:fixed;inset:0;z-index:0;pointer-events:none;}
.nebula{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 55% 35% at 15% 25%,rgba(124,58,237,.09) 0%,transparent 65%),
    radial-gradient(ellipse 45% 30% at 85% 65%,rgba(0,229,255,.07) 0%,transparent 65%),
    radial-gradient(ellipse 35% 55% at 55% 10%,rgba(255,23,68,.05) 0%,transparent 65%),
    radial-gradient(ellipse 40% 40% at 40% 90%,rgba(0,230,118,.04) 0%,transparent 65%);
}

/* ══════════════════════════════════════════════
   SCREENS
══════════════════════════════════════════════ */
.scr{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem;}
.scr.off{display:none!important;}

/* ══════════════════════════════════════════════
   MENU
══════════════════════════════════════════════ */
.logo-wrap{text-align:center;margin-bottom:0.3rem;}
.logo-void{
  font-family:var(--fh);font-size:clamp(3.5rem,12vw,7rem);font-weight:900;
  letter-spacing:0.18em;line-height:1;display:block;
  color:var(--c1);text-shadow:0 0 40px rgba(0,229,255,.7),0 0 100px rgba(0,229,255,.3);
  animation:vPulse 4s ease-in-out infinite;
}
@keyframes vPulse{0%,100%{text-shadow:0 0 40px rgba(0,229,255,.7),0 0 100px rgba(0,229,255,.3)}50%{text-shadow:0 0 60px rgba(0,229,255,.9),0 0 140px rgba(0,229,255,.5)}}
.logo-dom{
  font-family:var(--fh);font-size:clamp(1.6rem,5.5vw,3.2rem);font-weight:900;
  letter-spacing:0.35em;display:block;
  color:transparent;
  background:linear-gradient(90deg,#7c3aed,#ff1744,#7c3aed);
  background-size:200%;-webkit-background-clip:text;background-clip:text;
  animation:domShift 5s linear infinite;
}
@keyframes domShift{0%{background-position:0%}100%{background-position:200%}}
.tagline{
  font-size:clamp(.55rem,1.8vw,.78rem);letter-spacing:.5em;
  color:rgba(0,229,255,.35);text-transform:uppercase;margin-top:.5rem;
}

.card{
  background:var(--glass);
  border:1px solid var(--line);
  border-radius:2px;
  padding:2rem 2.2rem;
  width:min(390px,93vw);
  margin-top:1.8rem;
  position:relative;overflow:hidden;
}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--c1),transparent);}
.card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(124,58,237,.4),transparent);}

.card-ttl{font-family:var(--fh);font-size:.6rem;letter-spacing:.4em;color:rgba(0,229,255,.4);text-transform:uppercase;text-align:center;margin-bottom:1.4rem;}

.field{margin-bottom:1rem;}
.field label{display:block;font-size:.6rem;letter-spacing:.25em;color:rgba(0,229,255,.4);text-transform:uppercase;margin-bottom:.38rem;}
.field input{
  width:100%;background:rgba(0,229,255,.03);
  border:1px solid rgba(0,229,255,.18);border-radius:2px;
  padding:.72rem .9rem;color:#fff;font-family:var(--fb);font-size:.98rem;font-weight:500;
  outline:none;transition:border-color .2s,box-shadow .2s;
}
.field input:focus{border-color:var(--c1);box-shadow:0 0 0 1px rgba(0,229,255,.12),0 0 18px rgba(0,229,255,.07);}
.field input::placeholder{color:rgba(255,255,255,.14);}

/* Difficulty selector */
.diff-row{display:flex;gap:.5rem;margin-bottom:1rem;}
.diff-btn{
  flex:1;padding:.6rem .3rem;
  font-family:var(--fh);font-size:.55rem;letter-spacing:.12em;
  text-transform:uppercase;border-radius:2px;cursor:pointer;
  border:1px solid rgba(0,229,255,.18);background:transparent;color:rgba(0,229,255,.5);
  transition:all .2s;
}
.diff-btn.active{background:rgba(0,229,255,.1);border-color:var(--c1);color:var(--c1);}
.diff-btn:hover:not(.active){background:rgba(0,229,255,.05);}

/* Enemy count */
.bot-row{display:flex;gap:.5rem;margin-bottom:1.2rem;}
.bot-btn{
  flex:1;padding:.55rem .2rem;text-align:center;
  font-family:var(--fh);font-size:.62rem;letter-spacing:.1em;
  border-radius:2px;cursor:pointer;
  border:1px solid rgba(0,229,255,.18);background:transparent;color:rgba(0,229,255,.5);
  transition:all .2s;
}
.bot-btn.active{background:rgba(124,58,237,.15);border-color:#7c3aed;color:#b388ff;}
.bot-btn:hover:not(.active){background:rgba(0,229,255,.05);}

.btn{
  width:100%;padding:.85rem;
  font-family:var(--fh);font-size:.72rem;font-weight:700;letter-spacing:.22em;
  text-transform:uppercase;border:none;border-radius:2px;
  cursor:pointer;transition:all .2s;position:relative;overflow:hidden;
}
.btn::after{content:'';position:absolute;inset:0;background:transparent;transition:background .15s;}
.btn:hover::after{background:rgba(255,255,255,.06);}
.btn:active{transform:scale(.98);}
.btn-launch{
  background:linear-gradient(90deg,rgba(0,200,230,.9),rgba(124,58,237,.9));
  color:#fff;box-shadow:0 4px 24px rgba(0,170,210,.3);
}
.btn-launch:hover{box-shadow:0 6px 32px rgba(0,170,210,.5);}

.msg{min-height:1.3em;font-size:.72rem;letter-spacing:.1em;text-align:center;color:rgba(0,229,255,.45);margin-top:.5rem;}
.msg.err{color:var(--c3);}

/* ══════════════════════════════════════════════
   GAME CANVAS AREA
══════════════════════════════════════════════ */
#game-wrap{position:fixed;inset:0;z-index:10;display:none;}
#game-wrap.on{display:block;}
#cv{position:absolute;inset:0;width:100%;height:100%;touch-action:none;}

/* ══════════════════════════════════════════════
   HUD  (top bar)
══════════════════════════════════════════════ */
#hud{
  position:fixed;top:0;left:0;right:0;height:52px;z-index:30;
  display:flex;align-items:stretch;
  background:linear-gradient(180deg,rgba(0,2,12,.97) 0%,rgba(0,2,12,.75) 100%);
  border-bottom:1px solid var(--line);
  backdrop-filter:blur(14px);
  padding:0 .7rem;gap:0;
  display:none;
}
.hi{display:flex;flex-direction:column;justify-content:center;padding:0 .75rem;border-right:1px solid rgba(0,229,255,.09);flex-shrink:0;}
.hi-l{font-size:.46rem;letter-spacing:.22em;color:rgba(0,229,255,.32);text-transform:uppercase;}
.hi-v{font-family:var(--fh);font-size:.82rem;font-weight:700;color:#fff;line-height:1.2;}
.hi-v.c{color:var(--c1);}
.hi-v.g{color:var(--gold);}
.hi-v.gr{color:var(--green);}

.hud-pls{display:flex;align-items:center;gap:.45rem;flex:1;padding:0 .7rem;overflow:hidden;}
.hpill{display:flex;align-items:center;gap:.3rem;padding:.18rem .52rem;border-radius:20px;border:1px solid transparent;font-size:.68rem;font-weight:600;flex-shrink:0;}
.hpill.me{border-color:rgba(0,229,255,.3);background:rgba(0,229,255,.06);}
.hpill-d{width:6px;height:6px;border-radius:50%;}
.hud-r{display:flex;align-items:center;gap:.4rem;margin-left:auto;}
.hbtn{padding:.28rem .68rem;font-family:var(--fh);font-size:.52rem;letter-spacing:.13em;border-radius:2px;border:1px solid rgba(0,229,255,.22);background:transparent;color:var(--c1);cursor:pointer;transition:all .2s;text-transform:uppercase;}
.hbtn:hover{background:rgba(0,229,255,.08);}
.hbtn.red{border-color:rgba(255,23,68,.28);color:var(--c3);}
.hbtn.red:hover{background:rgba(255,23,68,.07);}

/* ══════════════════════════════════════════════
   RIGHT PANEL
══════════════════════════════════════════════ */
#rp{
  position:fixed;right:0;top:52px;bottom:0;width:235px;z-index:30;
  background:rgba(0,2,12,.93);border-left:1px solid var(--line);
  backdrop-filter:blur(16px);
  display:none;flex-direction:column;
  transition:transform .28s cubic-bezier(.4,0,.2,1);
}
#rp.open{display:flex;}
#rp.hide{transform:translateX(100%);}

.rp-sec{padding:.8rem;border-bottom:1px solid rgba(0,229,255,.07);flex-shrink:0;}
.rp-ttl{font-family:var(--fh);font-size:.52rem;letter-spacing:.3em;color:rgba(0,229,255,.3);text-transform:uppercase;margin-bottom:.65rem;}

.s-name{font-family:var(--fh);font-size:.85rem;font-weight:700;color:#fff;margin-bottom:.12rem;}
.s-own{font-size:.72rem;color:rgba(255,255,255,.38);margin-bottom:.55rem;}
.s-grid{display:grid;grid-template-columns:1fr 1fr;gap:.38rem;}
.sg{background:rgba(0,229,255,.04);border:1px solid rgba(0,229,255,.1);border-radius:2px;padding:.32rem .48rem;}
.sg-l{font-size:.5rem;letter-spacing:.13em;color:rgba(0,229,255,.32);}
.sg-v{font-family:var(--fh);font-size:.8rem;color:#fff;margin-top:.08rem;}

/* Build */
.brow{display:flex;align-items:center;gap:.45rem;padding:.32rem 0;border-bottom:1px solid rgba(255,255,255,.04);}
.brow:last-child{border:none;}
.br-info{flex:1;}
.br-n{font-size:.78rem;font-weight:600;}
.br-c{font-size:.6rem;color:var(--gold);}
.bb{background:rgba(0,229,255,.07);border:1px solid rgba(0,229,255,.2);border-radius:2px;padding:.24rem .52rem;font-family:var(--fh);font-size:.56rem;color:var(--c1);cursor:pointer;transition:all .2s;letter-spacing:.08em;}
.bb:hover{background:rgba(0,229,255,.16);}
.bb:disabled{opacity:.22;cursor:not-allowed;}

/* Attack */
.arow{display:flex;align-items:center;justify-content:space-between;padding:.32rem 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.74rem;}
.arow:last-child{border:none;}
.ab{background:rgba(255,23,68,.07);border:1px solid rgba(255,23,68,.22);border-radius:2px;padding:.22rem .48rem;font-family:var(--fh);font-size:.53rem;color:var(--c3);cursor:pointer;transition:all .2s;letter-spacing:.08em;}
.ab:hover{background:rgba(255,23,68,.18);}
.hint{font-size:.7rem;color:rgba(255,255,255,.22);line-height:1.5;}

/* Log */
.log-h{padding:.42rem .8rem .25rem;font-family:var(--fh);font-size:.5rem;letter-spacing:.3em;color:rgba(0,229,255,.25);text-transform:uppercase;flex-shrink:0;}
#elog{flex:1;overflow-y:auto;padding:.28rem .8rem .8rem;scrollbar-width:thin;scrollbar-color:rgba(0,229,255,.12) transparent;}
.le{font-size:.68rem;color:rgba(255,255,255,.32);padding:.25rem 0;border-bottom:1px solid rgba(255,255,255,.03);line-height:1.45;}
.le .ts{font-family:var(--fh);font-size:.52rem;color:rgba(0,229,255,.22);margin-right:.32rem;}
.le.ok{color:rgba(0,230,118,.65);}
.le.bad{color:rgba(255,100,100,.6);}
.le.build{color:rgba(255,196,0,.55);}
.le.ai{color:rgba(180,130,255,.55);}

/* ══════════════════════════════════════════════
   LEADERBOARD
══════════════════════════════════════════════ */
#lb{
  position:fixed;left:.65rem;top:62px;z-index:30;
  background:rgba(0,2,12,.88);border:1px solid var(--line);border-radius:2px;
  padding:.55rem .8rem;min-width:146px;backdrop-filter:blur(12px);display:none;
}
#lb h4{font-family:var(--fh);font-size:.5rem;letter-spacing:.28em;color:rgba(0,229,255,.28);text-transform:uppercase;margin-bottom:.45rem;}
.lbr{display:flex;align-items:center;gap:.38rem;padding:.22rem 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.74rem;}
.lbr:last-child{border:none;}
.lbrk{font-family:var(--fh);font-size:.58rem;color:rgba(255,255,255,.2);width:12px;}
.lbd{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.lbn{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lbc{font-family:var(--fh);font-size:.65rem;color:var(--green);}

/* ══════════════════════════════════════════════
   MINIMAP
══════════════════════════════════════════════ */
#mm{
  position:fixed;left:.65rem;bottom:.65rem;width:138px;height:104px;
  background:rgba(0,2,12,.88);border:1px solid var(--line);border-radius:2px;
  overflow:hidden;backdrop-filter:blur(8px);z-index:30;display:none;
}
#mmc{width:100%;height:100%;}

/* ══════════════════════════════════════════════
   ZOOM BUTTONS
══════════════════════════════════════════════ */
#zooms{position:fixed;bottom:.65rem;right:246px;z-index:30;display:none;flex-direction:column;gap:.32rem;}
.zb{width:32px;height:32px;background:rgba(0,2,12,.88);border:1px solid var(--line);border-radius:2px;color:var(--c1);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);transition:all .18s;}
.zb:hover{background:rgba(0,229,255,.1);}

/* ══════════════════════════════════════════════
   CONQUEST PROGRESS BAR
══════════════════════════════════════════════ */
#pgbar{position:fixed;bottom:0;left:0;right:0;height:3px;z-index:30;background:rgba(0,229,255,.07);display:none;}
#pgfill{height:100%;width:0%;background:linear-gradient(90deg,var(--c1),var(--c2));transition:width .6s ease;box-shadow:0 0 8px rgba(0,229,255,.4);}

/* ══════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════ */
#toasts{position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:60;display:flex;flex-direction:column;align-items:center;gap:.38rem;pointer-events:none;}
.tst{padding:.48rem 1.05rem;background:rgba(0,2,12,.95);border:1px solid var(--line);border-radius:2px;font-family:var(--fh);font-size:.62rem;letter-spacing:.13em;backdrop-filter:blur(14px);white-space:nowrap;animation:tIn .22s ease,tOut .28s ease 2.4s forwards;}
.tst.ok{border-color:rgba(0,230,118,.38);color:var(--green);}
.tst.err{border-color:rgba(255,23,68,.38);color:var(--c3);}
.tst.inf{border-color:rgba(0,229,255,.32);color:var(--c1);}
@keyframes tIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes tOut{from{opacity:1}to{opacity:0}}

/* ══════════════════════════════════════════════
   BATTLE MODAL
══════════════════════════════════════════════ */
#bmod{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.78);backdrop-filter:blur(8px);}
.bcard{background:rgba(0,2,16,.97);border:1px solid rgba(255,23,68,.32);border-radius:3px;padding:2rem 2.8rem;text-align:center;box-shadow:0 0 80px rgba(255,23,68,.12);animation:bPop .28s cubic-bezier(.34,1.56,.64,1);}
@keyframes bPop{from{transform:scale(.82);opacity:0}to{transform:scale(1);opacity:1}}
.btt{font-family:var(--fh);font-size:1.1rem;font-weight:900;letter-spacing:.25em;color:var(--c3);margin-bottom:.9rem;text-shadow:0 0 18px rgba(255,23,68,.5);}
.bvs{display:flex;align-items:center;justify-content:center;gap:2.2rem;font-family:var(--fh);}
.bside{text-align:center;}
.bnum{font-size:2.6rem;font-weight:900;line-height:1;}
.blbl{font-size:.52rem;letter-spacing:.2em;color:rgba(255,255,255,.28);margin-top:.25rem;}
.bvst{font-size:.8rem;color:rgba(255,255,255,.18);letter-spacing:.25em;}
.bres{margin-top:1.1rem;font-family:var(--fh);font-size:.92rem;font-weight:700;letter-spacing:.18em;}
.bres.win{color:var(--green);text-shadow:0 0 14px rgba(0,230,118,.45);}
.bres.loss{color:var(--c3);text-shadow:0 0 14px rgba(255,23,68,.45);}

/* ══════════════════════════════════════════════
   WIN / LOSE SCREEN
══════════════════════════════════════════════ */
#endscr{position:fixed;inset:0;z-index:70;display:none;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 40%,rgba(0,15,42,.98) 0%,rgba(0,2,10,.99) 70%);}
#endscr.on{display:flex;}
.end-ttl{font-family:var(--fh);font-size:clamp(2.5rem,9vw,5.5rem);font-weight:900;letter-spacing:.22em;text-align:center;}
.end-ttl.win{color:transparent;background:linear-gradient(135deg,var(--gold),#ff8f00,var(--gold));background-size:200%;-webkit-background-clip:text;background-clip:text;filter:drop-shadow(0 0 28px rgba(255,196,0,.5));animation:domShift 3s linear infinite;}
.end-ttl.lose{color:var(--c3);text-shadow:0 0 30px rgba(255,23,68,.5);}
.end-sub{font-size:.9rem;letter-spacing:.35em;color:rgba(255,255,255,.28);margin:.55rem 0 1.8rem;text-transform:uppercase;text-align:center;}
.end-stats{display:flex;gap:1.5rem;margin-bottom:1.8rem;}
.estat{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:2px;padding:.75rem 1.3rem;text-align:center;}
.estat-v{font-family:var(--fh);font-size:1.5rem;font-weight:900;color:var(--gold);}
.estat-l{font-size:.55rem;letter-spacing:.2em;color:rgba(255,255,255,.28);text-transform:uppercase;margin-top:.18rem;}
.end-btns{display:flex;gap:.8rem;}
.end-btn{padding:.75rem 1.6rem;font-family:var(--fh);font-size:.65rem;letter-spacing:.2em;font-weight:700;text-transform:uppercase;border-radius:2px;cursor:pointer;transition:all .2s;}
.end-btn.primary{background:linear-gradient(90deg,var(--c1),var(--c2));color:#fff;border:none;box-shadow:0 4px 20px rgba(0,170,210,.3);}
.end-btn.secondary{background:transparent;color:var(--c1);border:1px solid rgba(0,229,255,.28);}
.end-btn:hover{transform:translateY(-2px);}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="nebula"></div>

<!-- ══════════════ MENU ══════════════ -->
<div class="scr" id="s-menu">
  <div class="logo-wrap">
    <span class="logo-void">VOID</span>
    <span class="logo-dom">DOMINION</span>
    <div class="tagline">Galactic Sector Conquest &bull; Solo Campaign</div>
  </div>

  <div class="card">
    <div class="card-ttl">Mission Setup</div>

    <div class="field">
      <label>Commander Callsign</label>
      <input id="inp-name" type="text" placeholder="Enter your name" maxlength="14" autocomplete="off" spellcheck="false">
    </div>

    <div class="field">
      <label>Difficulty</label>
      <div class="diff-row">
        <button class="diff-btn active" data-d="easy">EASY</button>
        <button class="diff-btn" data-d="normal">NORMAL</button>
        <button class="diff-btn" data-d="hard">HARD</button>
      </div>
    </div>

    <div class="field">
      <label>Enemy Commanders</label>
      <div class="bot-row">
        <button class="bot-btn" data-b="1">1 Enemy</button>
        <button class="bot-btn active" data-b="2">2 Enemies</button>
        <button class="bot-btn" data-b="3">3 Enemies</button>
      </div>
    </div>

    <button class="btn btn-launch" id="btn-start">LAUNCH MISSION</button>
    <div class="msg" id="msg-menu"></div>
  </div>
</div>

<!-- ══════════════ GAME ══════════════ -->
<div id="game-wrap">
  <canvas id="cv"></canvas>
</div>

<!-- HUD -->
<div id="hud">
  <div class="hi" style="padding-left:.2rem;">
    <div class="hi-l">Commander</div>
    <div class="hi-v c" id="hv-name">-</div>
  </div>
  <div class="hi">
    <div class="hi-l">Resources</div>
    <div class="hi-v g" id="hv-res">0</div>
  </div>
  <div class="hi">
    <div class="hi-l">Sectors</div>
    <div class="hi-v gr" id="hv-sec">0/0</div>
  </div>
  <div class="hi">
    <div class="hi-l">Fleet</div>
    <div class="hi-v c" id="hv-fl">0</div>
  </div>
  <div class="hud-pls" id="hv-pls"></div>
  <div class="hud-r">
    <button class="hbtn" id="hbtn-p">INTEL</button>
    <button class="hbtn red" id="hbtn-q">QUIT</button>
  </div>
</div>

<!-- Right Panel -->
<div id="rp">
  <div class="rp-sec" id="rp-info">
    <div class="rp-ttl">Sector Intel</div>

<script>
'use strict';
// ════════════════════════════════════════════════════
//  CONSTANTS
// ════════════════════════════════════════════════════
const HEX   = 33;
const COLS  = 26, ROWS = 22;
const NSEC  = 112;
const WIN   = 0.60;
const RTICK = 4000; // resource tick ms

const PCOLORS = ['#00e5ff','#ff1744','#00e676','#ffc400','#ff6d00','#d500f9'];
const BOT_NAMES = ['AI-NEXUS','VOID-REAPER','STAR-FORGE','DARK-HERALD'];

const SHIPS = [
  {id:'scout',    name:'Scout',    cost:45,  atk:2,  def:1,  desc:'Fast &amp; cheap'},
  {id:'fighter',  name:'Fighter',  cost:130, atk:5,  def:4,  desc:'Balanced warrior'},
  {id:'cruiser',  name:'Cruiser',  cost:310, atk:12, def:9,  desc:'Heavy firepower'},
];

const STYPES = ['star','nebula','void','normal','normal','normal','normal','normal','normal'];
const SYIELD = {star:28, nebula:20, void:6, normal:11};

// Difficulty modifiers
const DIFF = {
  easy:   {botAtk:.7,  botDef:.8,  botTick:6000, botRes:.8 },
  normal: {botAtk:.95, botDef:.95, botTick:4500, botRes:1.0},
  hard:   {botAtk:1.3, botDef:1.25,botTick:3000, botRes:1.3},
};

// ════════════════════════════════════════════════════
//  GAME STATE
// ════════════════════════════════════════════════════
let G = null; // { players:{}, sectors:{}, status, winner, tick }
let sectors = [];
let myId  = 'player';
let diff  = 'normal';
let nBots = 2;

// Render
let canvas, ctx, mmc, mctx;
let vX=0,vY=0,vS=1;
let drag=false,lx=0,ly=0,tD=0,tS=1;
let raf=null, lastT=0;
let selId=null;
let anims=[];   // capture burst anims
let resTimer=null, botTimer=null;

// ════════════════════════════════════════════════════
//  UTILS
// ════════════════════════════════════════════════════
const $  = id => document.getElementById(id);
const rnd = (a,b) => a+Math.random()*(b-a);
const clamp = (v,a,b) => Math.max(a,Math.min(b,v));
const ts = () => { const d=new Date(); return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`; };

function setMsg(id,t,c=''){const e=$(id);if(e){e.textContent=t;e.className='msg'+(c?' '+c:'');}}

function toast(msg,type='inf'){
  const t=document.createElement('div');
  t.className='tst '+type; t.textContent=msg;
  $('toasts').appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

function log(msg,cls=''){
  const el=$('elog'); if(!el)return;
  const d=document.createElement('div');
  d.className='le '+cls;
  d.innerHTML=`<span class="ts">${ts()}</span>${msg}`;
  el.prepend(d);
  while(el.children.length>120)el.removeChild(el.lastChild);
}

function showScr(id){
  ['s-menu'].forEach(s=>$(s)?.classList.add('off'));
  $(id)?.classList.remove('off');
}

function pColor(pid){
  const keys=Object.keys(G?.players||{});
  const i=keys.indexOf(pid);
  return i>=0?PCOLORS[i]:'#445';
}

function hexA(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ════════════════════════════════════════════════════
//  STARFIELD
// ════════════════════════════════════════════════════
(()=>{
  const c=$('stars'),cx=c.getContext('2d');
  const stars=Array.from({length:380},()=>({
    x:Math.random(),y:Math.random(),
    r:Math.random()*1.4+.15,
    sp:Math.random()*.00018+.00003,
    o:Math.random()*.75+.1,
    t:Math.random()*Math.PI*2
  }));
  let W,H;
  const rsz=()=>{W=c.width=innerWidth;H=c.height=innerHeight;};
  rsz(); addEventListener('resize',rsz);
  (function loop(){
    cx.clearRect(0,0,W,H);
    const t=Date.now()*.001;
    stars.forEach(s=>{
      s.x-=s.sp; if(s.x<0){s.x=1;s.y=Math.random();}
      const alpha=s.o*(.35+.55*Math.sin(t*.6+s.t));
      cx.beginPath(); cx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
      cx.fillStyle=`rgba(190,220,255,${alpha})`; cx.fill();
    });
    requestAnimationFrame(loop);
  })();
})();

// ════════════════════════════════════════════════════
//  HEX GEOMETRY
// ════════════════════════════════════════════════════
function h2p(col,row){
  const w=HEX*2,h=Math.sqrt(3)*HEX;
  return {x:col*w*.75+HEX*1.7, y:row*h+(col%2===0?h/2:0)+HEX*1.7};
}
function hexPts(cx,cy,sz){
  const p=[];
  for(let i=0;i<6;i++){const a=Math.PI/180*(60*i-30);p.push({x:cx+sz*Math.cos(a),y:cy+sz*Math.sin(a)});}
  return p;
}
function buildMap(){
  sectors=[];
  let id=0;
  const cc=COLS/2,cr=ROWS/2;
  for(let col=0;col<COLS&&sectors.length<NSEC;col++){
    for(let row=0;row<ROWS&&sectors.length<NSEC;row++){
      const dc=col-cc,dr=row-cr;
      if(Math.sqrt(dc*dc+dr*dr*1.1)<11 && Math.random()>.06){
        const {x,y}=h2p(col,row);
        const type=STYPES[Math.floor(Math.random()*STYPES.length)];
        const yld=(SYIELD[type]||11)+Math.floor(Math.random()*7);
        sectors.push({id:id++,col,row,cx:x,cy:y,type,yld});
      }
    }
  }
}
function secAt(px,py){
  let best=null,bd=Infinity;
  sectors.forEach(s=>{const d=Math.hypot(s.cx-px,s.cy-py);if(d<HEX*1.12&&d<bd){bd=d;best=s;}});
  return best;
}
function neighbors(s){
  const {col,row}=s,ev=col%2===0;
  const dirs=ev?[{dc:-1,dr:0},{dc:-1,dr:-1},{dc:0,dr:-1},{dc:1,dr:-1},{dc:1,dr:0},{dc:0,dr:1}]
               :[{dc:-1,dr:1},{dc:-1,dr:0},{dc:0,dr:-1},{dc:1,dr:0},{dc:1,dr:1},{dc:0,dr:1}];
  return dirs.map(d=>sectors.find(x=>x.col===col+d.dc&&x.row===row+d.dr)).filter(Boolean);
}

// ════════════════════════════════════════════════════
//  CANVAS & RENDER
// ════════════════════════════════════════════════════
function initCanvas(){
  canvas=$('cv'); ctx=canvas.getContext('2d');
  mmc=$('mmc'); mctx=mmc.getContext('2d');
  mmc.width=138; mmc.height=104;

  const rsz=()=>{canvas.width=innerWidth;canvas.height=innerHeight;fitView();};
  addEventListener('resize',rsz); rsz();

  // Mouse
  canvas.addEventListener('mousedown',e=>{drag=true;lx=e.clientX;ly=e.clientY;});
  canvas.addEventListener('mousemove',e=>{if(!drag)return;vX+=e.clientX-lx;vY+=e.clientY-ly;lx=e.clientX;ly=e.clientY;});
  canvas.addEventListener('mouseup',e=>{if(drag&&Math.abs(e.movementX)+Math.abs(e.movementY)<4)onTap(e.clientX,e.clientY);drag=false;});
  canvas.addEventListener('wheel',e=>{e.preventDefault();vS=clamp(vS*(e.deltaY<0?1.12:.89),.2,3.2);},{passive:false});

  // Touch
  canvas.addEventListener('touchstart',e=>{
    e.preventDefault();
    if(e.touches.length===1){drag=true;lx=e.touches[0].clientX;ly=e.touches[0].clientY;}
    if(e.touches.length===2){drag=false;tD=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);tS=vS;}
  },{passive:false});
  canvas.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(e.touches.length===1&&drag){vX+=e.touches[0].clientX-lx;vY+=e.touches[0].clientY-ly;lx=e.touches[0].clientX;ly=e.touches[0].clientY;}
    if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);vS=clamp(tS*(d/tD),.2,3.2);}
  },{passive:false});
  canvas.addEventListener('touchend',e=>{
    e.preventDefault();
    if(drag&&e.changedTouches.length===1){const t=e.changedTouches[0];if(Math.abs(t.clientX-lx)+Math.abs(t.clientY-ly)<10)onTap(t.clientX,t.clientY);}
    drag=false;
  },{passive:false});

  $('z+').onclick=()=>{vS=clamp(vS*1.18,.2,3.2);};
  $('z-').onclick=()=>{vS=clamp(vS*.85,.2,3.2);};
  $('zf').onclick=fitView;
}

function fitView(){
  if(!sectors.length||!canvas)return;
  const xs=sectors.map(s=>s.cx),ys=sectors.map(s=>s.cy);
  const mnx=Math.min(...xs),mxx=Math.max(...xs),mny=Math.min(...ys),mxy=Math.max(...ys);
  const mw=mxx-mnx+HEX*3.5,mh=mxy-mny+HEX*3.5;
  vS=Math.min(canvas.width/mw,canvas.height/mh)*.88;
  vX=(canvas.width-mw*vS)/2-mnx*vS+HEX*1.8*vS;
  vY=(canvas.height-mh*vS)/2-mny*vS+HEX*1.8*vS;
}

function startRender(){
  if(raf)return;
  (function loop(t){raf=requestAnimationFrame(loop);if(t-lastT<28)return;lastT=t;draw(t);})();
}

function draw(t){
  if(!ctx||!sectors.length)return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#00020c'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.save(); ctx.translate(vX,vY); ctx.scale(vS,vS);

  const pulse=.5+.5*Math.sin(t*.004);

  sectors.forEach(s=>{
    const gs=G.sectors[s.id];
    const sel=s.id===selId;
    const col=gs.ownerId?pColor(gs.ownerId):null;
    const pts=hexPts(s.cx,s.cy,HEX-1.5);

    // Glow
    if(sel){ctx.shadowBlur=24*vS;ctx.shadowColor='rgba(255,255,255,.55)';}
    else if(col){ctx.shadowBlur=10*vS;ctx.shadowColor=hexA(col,.35);}

    // Fill
    ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
    for(let i=1;i<6;i++)ctx.lineTo(pts[i].x,pts[i].y);
    ctx.closePath();

    let fill='rgba(0,6,22,.9)';
    if(col) fill=hexA(col,sel?.32:.17);
    else if(s.type==='star')   fill='rgba(255,200,0,.06)';
    else if(s.type==='nebula') fill='rgba(124,58,237,.07)';
    ctx.fillStyle=fill; ctx.fill();
    ctx.shadowBlur=0;

    // Border
    ctx.strokeStyle=sel?'#ffffff':(col||'rgba(0,229,255,.14)');
    ctx.lineWidth=sel?2.4:1.0; ctx.stroke();

    // Inner rim for owned
    if(col&&!sel){
      const ip=hexPts(s.cx,s.cy,HEX-4.5);
      ctx.beginPath();ctx.moveTo(ip[0].x,ip[0].y);
      for(let i=1;i<6;i++)ctx.lineTo(ip[i].x,ip[i].y);
      ctx.closePath();
      ctx.strokeStyle=hexA(col,.1);ctx.lineWidth=.8;ctx.stroke();
    }

    // Type symbol
    if(vS>.46){
      const sym=s.type==='star'?'*':s.type==='nebula'?'~':s.type==='void'?'X':'';
      if(sym){
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.font=`bold ${HEX*.38}px Orbitron,monospace`;
        ctx.fillStyle=s.type==='star'?'#ffc400':s.type==='nebula'?'#b06aff':'#3a5060';
        ctx.fillText(sym,s.cx,s.cy-(gs.fleet>0?HEX*.22:0));
      }
    }

    // Fleet count
    if((gs.fleet||0)>0&&vS>.38){
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.font=`bold ${Math.max(8,HEX*.38)}px Orbitron,monospace`;
      ctx.fillStyle=col||'rgba(255,255,255,.38)';
      ctx.fillText(gs.fleet,s.cx,s.cy+(s.type!=='normal'&&vS>.46?HEX*.26:0));
    }

    // Owner beacon
    if(col&&vS>.48){
      ctx.beginPath();ctx.arc(s.cx,s.cy-HEX*.63,3.5,0,Math.PI*2);
      ctx.shadowBlur=7;ctx.shadowColor=col;
      ctx.fillStyle=col;ctx.fill();ctx.shadowBlur=0;
    }
  });

  // Pulse ring
  if(selId!==null){
    const s=sectors.find(x=>x.id===selId);
    if(s){
      const pts=hexPts(s.cx,s.cy,HEX+7);
      ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
      for(let i=1;i<6;i++)ctx.lineTo(pts[i].x,pts[i].y);
      ctx.closePath();
      ctx.strokeStyle=`rgba(255,255,255,${.18+.22*pulse})`;
      ctx.lineWidth=1.5;ctx.stroke();
    }
  }

  // Capture burst anims
  anims=anims.filter(a=>{
    const age=(t-a.t)/700; if(age>1)return false;
    const pts=hexPts(a.x,a.y,HEX*(1+age*.25));
    ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
    for(let i=1;i<6;i++)ctx.lineTo(pts[i].x,pts[i].y);
    ctx.closePath();
    ctx.strokeStyle=hexA(a.col,(1-age)*.75);
    ctx.lineWidth=2*(1-age);ctx.stroke();
    return true;
  });

  ctx.restore();
  drawMini();
}

function drawMini(){
  if(!mctx||!sectors.length)return;
  const W=138,H=104;
  mctx.clearRect(0,0,W,H);
  mctx.fillStyle='rgba(0,2,12,.92)';mctx.fillRect(0,0,W,H);
  const xs=sectors.map(s=>s.cx),ys=sectors.map(s=>s.cy);
  const mnx=Math.min(...xs),mxx=Math.max(...xs),mny=Math.min(...ys),mxy=Math.max(...ys);
  const sc=Math.min(120/(mxx-mnx+1),86/(mxy-mny+1))*.94;
  sectors.forEach(s=>{
    const gs=G.sectors[s.id];
    const px=(s.cx-mnx)*sc+9,py=(s.cy-mny)*sc+9;
    mctx.beginPath();mctx.arc(px,py,gs.ownerId?2.6:1.6,0,Math.PI*2);
    mctx.fillStyle=gs.ownerId?pColor(gs.ownerId):'rgba(0,229,255,.13)';
    mctx.fill();
  });
  // viewport box
  const rx=(-vX/vS)*sc+9,ry=(-vY/vS)*sc+9;
  mctx.strokeStyle='rgba(255,255,255,.28)';mctx.lineWidth=1;
  mctx.strokeRect(rx,ry,(canvas.width/vS)*sc,(canvas.height/vS)*sc);
}

// ════════════════════════════════════════════════════
//  TAP / SELECT
// ════════════════════════════════════════════════════
function onTap(cx,cy){
  if(!G||G.status!=='playing')return;
  const rect=canvas.getBoundingClientRect();
  const s=secAt((cx-rect.left-vX)/vS,(cy-rect.top-vY)/vS);
  if(s)selectSec(s.id);
}

function selectSec(id){
  selId=id;
  const s=sectors.find(x=>x.id===id);
  const gs=G.sectors[id];
  if(!s||!gs)return;

  const own=gs.ownerId?(G.players[gs.ownerId]?.name||'?'):'Unclaimed';
  const oc=gs.ownerId?pColor(gs.ownerId):'#556';
  const tn={star:'Star System',nebula:'Nebula',void:'Void Rift',normal:'Sector'};

  $('rpi-body').innerHTML=
    `<div class="s-name">${tn[s.type]||'Sector'} #${id}</div>
     <div class="s-own">Owner: <span style="color:${oc};font-weight:600">${own}</span></div>
     <div class="s-grid">
       <div class="sg"><div class="sg-l">Fleet</div><div class="sg-v">${gs.fleet||0}</div></div>
       <div class="sg"><div class="sg-l">Yield/tick</div><div class="sg-v">${s.yld}</div></div>
       <div class="sg"><div class="sg-l">Type</div><div class="sg-v" style="font-size:.65rem">${s.type.toUpperCase()}</div></div>
       <div class="sg"><div class="sg-l">Adjacent</div><div class="sg-v">${neighbors(s).length}</div></div>
     </div>`;

  const bld=$('rp-bld'),atk=$('rp-atk');
  if(gs.ownerId===myId){
    bld.style.display='block'; renderBuild(s,gs);
    atk.style.display='block'; renderAtk(s,gs);
  } else {
    bld.style.display='none';
    atk.style.display='none';
  }
}

function renderBuild(s,gs){
  const res=G.players[myId]?.resources||0;
  $('rpb-body').innerHTML=SHIPS.map(sh=>
    `<div class="brow">
       <div class="br-info">
         <div class="br-n">${sh.name}</div>
         <div class="br-c">${sh.cost} res &nbsp;&bull;&nbsp; ATK:${sh.atk} DEF:${sh.def} &nbsp;&bull;&nbsp; <em style="font-style:normal;opacity:.7">${sh.desc}</em></div>
       </div>
       <button class="bb" ${res<sh.cost?'disabled':''} onclick="doBuild(${s.id},'${sh.id}')">BUILD</button>
     </div>`).join('');
}

function renderAtk(s,gs){
  const ab=$('rpa-body');
  if((gs.fleet||0)<1){ab.innerHTML='<div class="hint">No fleet stationed here.<br>Build ships first.</div>';return;}
  const tgts=neighbors(s).filter(n=>G.sectors[n.id].ownerId!==myId);
  if(!tgts.length){ab.innerHTML='<div class="hint">No adjacent targets.<br>Expand your borders first.</div>';return;}
  ab.innerHTML=tgts.map(t=>{
    const gt=G.sectors[t.id];
    const tn=gt.ownerId?(G.players[gt.ownerId]?.name||'?'):'Neutral';
    const tc=gt.ownerId?pColor(gt.ownerId):'#4a6070';
    return `<div class="arow">
      <span>#${t.id} <span style="color:${tc}">[${tn}]</span> &nbsp;F:${gt.fleet||0}</span>
      <button class="ab" onclick="doAttack(${s.id},${t.id})">STRIKE</button>
    </div>`;
  }).join('');
}

// ════════════════════════════════════════════════════
//  PLAYER ACTIONS
// ════════════════════════════════════════════════════
function doBuild(secId,shipId){
  const sh=SHIPS.find(s=>s.id===shipId);
  const me=G.players[myId];
  if(!me||me.resources<sh.cost){toast('Insufficient resources!','err');return;}
  me.resources-=sh.cost;
  G.sectors[secId].fleet=(G.sectors[secId].fleet||0)+1;
  log(`Built ${sh.name} in Sector #${secId}`,'build');
  updateHUD();
  if(selId===secId)selectSec(selId);
}

function doAttack(fromId,toId){
  const from=G.sectors[fromId],to=G.sectors[toId];
  if(!from||!to||(from.fleet||0)<1){toast('Need fleet to attack!','err');return;}

  $('b-a').textContent=from.fleet;
  $('b-d').textContent=to.fleet||0;
  $('b-res').textContent='';
  $('bmod').style.display='flex';

  setTimeout(()=>{
    $('bmod').style.display='none';
    resolveAttack(fromId,toId,myId,true);
    checkWin();
    updateHUD();
    if(selId!==null)selectSec(selId);
  },1500);
}

function resolveAttack(fromId,toId,attackerId,showAnim){
  const from=G.sectors[fromId],to=G.sectors[toId];
  if(!from||(from.fleet||0)<1)return;

  const d=DIFF[diff];
  const isBot=attackerId!==myId;
  const atkMul=isBot?d.botAtk:1;
  const defMul=isBot?1:d.botDef;

  const atkPow=(from.fleet||1)*atkMul*(1+rnd(0,.45));
  const defPow=((to.fleet||0)+(to.ownerId?1:0))*defMul*(1.15+rnd(0,.35));
  const win=atkPow>defPow;

  if(win){
    const rem=Math.max(1,Math.floor((from.fleet||1)-(to.fleet||0)*.55));
    to.ownerId=attackerId;
    to.fleet=rem;
    from.fleet=0;
    // capture anim
    const ts2=sectors.find(x=>x.id===toId);
    if(ts2)anims.push({x:ts2.cx,y:ts2.cy,col:pColor(attackerId),t:performance.now()});

    if(showAnim){
      $('b-res').className='bres win';
      $('b-res').textContent='SECTOR CAPTURED!';
      toast('Sector captured!','ok');
      log(`You captured Sector #${toId}`,'ok');
    } else {
      const bname=G.players[attackerId]?.name||'BOT';
      log(`${bname} captured Sector #${toId}`,'ai');
    }
  } else {
    to.fleet=Math.max(0,Math.floor((to.fleet||0)-(from.fleet||1)*.55));
    from.fleet=0;
    if(showAnim){
      $('b-res').className='bres loss';
      $('b-res').textContent='ATTACK REPELLED!';
      log(`Attack on Sector #${toId} repelled`,'bad');
    }
  }
}

// ════════════════════════════════════════════════════
//  AI BOTS
// ════════════════════════════════════════════════════
function botTick(){
  if(!G||G.status!=='playing')return;
  const d=DIFF[diff];

  Object.keys(G.players).forEach(pid=>{
    if(pid===myId)return;
    const bot=G.players[pid];
    if(!bot)return;

    const mySecsList=Object.values(G.sectors).filter(s=>s.ownerId===pid);
    if(!mySecsList.length)return;

    // income
    const income=mySecsList.reduce((a,s)=>a+(sectors.find(x=>x.id===s.id)?.yld||11)*d.botRes,0);
    bot.resources=(bot.resources||0)+income;

    // decide: build or attack
    const action=Math.random();

    if(action<0.5&&bot.resources>=45){
      // build cheapest affordable ship
      const affordable=SHIPS.filter(sh=>sh.cost<=bot.resources).sort((a,b)=>b.cost-a.cost);
      if(affordable.length){
        const sh=affordable[0];
        const target=mySecsList[Math.floor(Math.random()*mySecsList.length)];
        target.fleet=(target.fleet||0)+1;
        bot.resources-=sh.cost;
      }
    }

    if(action>=0.3){
      // find best attack: pick sector with fleet, attack weakest neighbor
      const frontline=mySecsList.filter(s=>(s.fleet||0)>0);
      if(frontline.length){
        const from=frontline[Math.floor(Math.random()*frontline.length)];
        const fromSec=sectors.find(x=>x.id===from.id);
        if(fromSec){
          const tgts=neighbors(fromSec).filter(n=>G.sectors[n.id].ownerId!==pid);
          if(tgts.length){
            tgts.sort((a,b)=>(G.sectors[a.id].fleet||0)-(G.sectors[b.id].fleet||0));
            resolveAttack(from.id,tgts[0].id,pid,false);
            checkWin();
          }
        }
      }
    }
  });
  updateHUD();
}

// ════════════════════════════════════════════════════
//  RESOURCE TICK (player)
// ════════════════════════════════════════════════════
function resTick(){
  if(!G||G.status!=='playing')return;
  Object.keys(G.players).forEach(pid=>{
    const inc=Object.values(G.sectors).filter(s=>s.ownerId===pid)
      .reduce((a,s)=>a+(sectors.find(x=>x.id===s.id)?.yld||11),0);
    G.players[pid].resources=(G.players[pid].resources||0)+inc;
  });
  updateHUD();
}

// ════════════════════════════════════════════════════
//  WIN CHECK
// ════════════════════════════════════════════════════
function checkWin(){
  const all=Object.values(G.sectors),total=all.length,cnt={};
  all.forEach(s=>{if(s.ownerId)cnt[s.ownerId]=(cnt[s.ownerId]||0)+1;});
  for(const [pid,n] of Object.entries(cnt)){
    if(n/total>=WIN){G.status='ended';G.winner=pid;showEnd();return;}
  }
  // Check if player is eliminated
  const playerSecs=all.filter(s=>s.ownerId===myId).length;
  if(playerSecs===0&&G.tick>3){
    G.status='ended';G.winner='bot';showEnd();
  }
}

// ════════════════════════════════════════════════════
//  HUD UPDATE
// ════════════════════════════════════════════════════
function updateHUD(){
  if(!G)return;
  const me=G.players[myId];
  const all=Object.values(G.sectors);
  const total=all.length;
  if(me){
    $('hv-name').textContent=me.name;
    $('hv-res').textContent=me.resources||0;
    const ms=all.filter(s=>s.ownerId===myId);
    $('hv-sec').textContent=`${ms.length}/${total}`;
    $('hv-fl').textContent=ms.reduce((a,s)=>a+(s.fleet||0),0);
    // progress
    $('pgfill').style.width=((ms.length/total)*100).toFixed(1)+'%';
  }

  // Player pills
  const pls=Object.entries(G.players);
  $('hv-pls').innerHTML=pls.map(([pid,p],i)=>{
    const sc=all.filter(s=>s.ownerId===pid).length;
    return `<div class="hpill ${pid===myId?'me':''}">
      <div class="hpill-d" style="background:${PCOLORS[i]};box-shadow:0 0 5px ${PCOLORS[i]}"></div>
      <span>${p.name}</span>
      <span style="color:${PCOLORS[i]};font-family:var(--fh);font-size:.6rem;margin-left:.18rem">${sc}</span>
    </div>`;
  }).join('');

  // Leaderboard
  const sorted=pls.map(([pid,p],i)=>({
    pid,name:p.name,color:PCOLORS[i],
    cnt:all.filter(s=>s.ownerId===pid).length
  })).sort((a,b)=>b.cnt-a.cnt);
  $('lb-body').innerHTML=sorted.map((p,i)=>
    `<div class="lbr">
       <span class="lbrk">#${i+1}</span>
       <div class="lbd" style="background:${p.color};box-shadow:0 0 4px ${p.color}"></div>
       <span class="lbn" style="${p.pid===myId?'color:var(--c1);font-weight:600':''}">${p.name}</span>
       <span class="lbc">${p.cnt}</span>
     </div>`).join('');

  if(selId!==null)selectSec(selId);
}

// ════════════════════════════════════════════════════
//  END SCREEN
// ════════════════════════════════════════════════════
function showEnd(){
  clearInterval(resTimer);
  clearInterval(botTimer);

  const me=G.winner===myId;
  const all=Object.values(G.sectors);
  const ms=all.filter(s=>s.ownerId===myId);

  $('end-ttl').textContent=me?'VICTORY':'DEFEATED';
  $('end-ttl').className='end-ttl '+(me?'win':'lose');
  $('end-sub').textContent=me?'The galaxy bows to your dominion':
    `${G.players[G.winner]?.name||'Enemy'} has conquered the galaxy`;
  $('es-sec').textContent=ms.length;
  $('es-fl').textContent=ms.reduce((a,s)=>a+(s.fleet||0),0);
  $('es-res').textContent=G.players[myId]?.resources||0;
  $('endscr').classList.add('on');
  if(me)toast('Galaxy conquered!','ok');
}

// ════════════════════════════════════════════════════
//  GAME START
// ════════════════════════════════════════════════════
function startGame(){
  buildMap();
  const d=DIFF[diff];

  // Init players
  const players={};
  players[myId]={name:$('inp-name').value.trim()||'Commander',resources:200,isBot:false};
  for(let i=0;i<nBots;i++){
    const bid='bot'+i;
    players[bid]={name:BOT_NAMES[i],resources:Math.round(200*d.botRes),isBot:true};
  }

  // Init sectors
  const secs={};
  sectors.forEach(s=>{secs[s.id]={ownerId:null,fleet:0};});

  G={status:'playing',winner:null,tick:0,players,sectors:secs};

  // Assign starting sectors
  const pids=Object.keys(players);
  const shuffled=[...sectors].sort(()=>Math.random()-.5);
  const step=Math.floor(shuffled.length/pids.length);
  pids.forEach((pid,i)=>{
    const ss=G.sectors[shuffled[Math.min(i*step,shuffled.length-1)].id];
    ss.ownerId=pid; ss.fleet=5;
  });

  // Show game UI
  $('s-menu').classList.add('off');
  $('game-wrap').classList.add('on');
  $('hud').style.display='flex';
  $('rp').classList.add('open');
  $('lb').style.display='block';
  $('mm').style.display='block';
  $('zooms').style.display='flex';
  $('pgbar').style.display='block';
  $('endscr').classList.remove('on');

  initCanvas(); fitView(); startRender();
  resTimer=setInterval(resTick,RTICK);
  botTimer=setInterval(botTick,d.botTick);
  updateHUD();
  log('Mission launched. Conquer 60% to win.','ok');
}

// ════════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════════
window.addEventListener('load',()=>{

  // Difficulty buttons
  document.querySelectorAll('.diff-btn').forEach(b=>{
    b.addEventListener('click',()=>{
      document.querySelectorAll('.diff-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      diff=b.dataset.d;
    });
  });

  // Bot count buttons
  document.querySelectorAll('.bot-btn').forEach(b=>{
    b.addEventListener('click',()=>{
      document.querySelectorAll('.bot-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      nBots=parseInt(b.dataset.b);
    });
  });

  $('btn-start').addEventListener('click',()=>{
    const name=$('inp-name').value.trim();
    if(!name){setMsg('msg-menu','Enter your commander name!','err');return;}
    startGame();
  });
  $('inp-name').addEventListener('keydown',e=>{if(e.key==='Enter')$('btn-start').click();});

  $('hbtn-p').addEventListener('click',()=>$('rp').classList.toggle('hide'));
  $('hbtn-q').addEventListener('click',()=>{
    if(!confirm('Abort mission?'))return;
    clearInterval(resTimer);clearInterval(botTimer);
    $('game-wrap').classList.remove('on');
    $('hud').style.display='none';
    $('rp').classList.remove('open');
    $('lb').style.display='none';
    $('mm').style.display='none';
    $('zooms').style.display='none';
    $('pgbar').style.display='none';
    $('s-menu').classList.remove('off');
    selId=null; G=null; sectors=[];
    if(raf){cancelAnimationFrame(raf);raf=null;}
  });

  $('btn-retry').addEventListener('click',()=>{
    $('endscr').classList.remove('on');
    clearInterval(resTimer);clearInterval(botTimer);
    if(raf){cancelAnimationFrame(raf);raf=null;}
    selId=null;anims=[];
    startGame();
  });
  $('btn-menu2').addEventListener('click',()=>{
    $('endscr').classList.remove('on');
    $('game-wrap').classList.remove('on');
    $('hud').style.display='none';
    $('rp').classList.remove('open');
    $('lb').style.display='none';
    $('mm').style.display='none';
    $('zooms').style.display='none';
    $('pgbar').style.display='none';
    $('s-menu').classList.remove('off');
    clearInterval(resTimer);clearInterval(botTimer);
    if(raf){cancelAnimationFrame(raf);raf=null;}
    selId=null;G=null;sectors=[];
  });
});
</script>
