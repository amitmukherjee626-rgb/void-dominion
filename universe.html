<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VOID DOMINION — Universe</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#00010a;--cyan:#00e5ff;--purple:#7c3aed;
  --red:#ff1744;--gold:#ffc400;--green:#00e676;
  --border:rgba(0,229,255,0.15);
  --fh:'Orbitron',monospace;--fb:'Exo 2',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;font-family:var(--fb);color:#d0eeff;-webkit-tap-highlight-color:transparent;user-select:none;}

/* CANVAS */
#cv{position:fixed;inset:0;z-index:1;touch-action:none;}

/* TOP HUD - compact for mobile */
#hud{
  position:fixed;top:0;left:0;right:0;z-index:20;
  height:48px;
  background:linear-gradient(180deg,rgba(0,1,10,.97) 0%,rgba(0,1,10,.75) 100%);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(12px);
  display:flex;align-items:center;
  padding:0 10px;gap:8px;
}
.hl{font-family:var(--fh);font-size:11px;font-weight:900;letter-spacing:2px;color:var(--cyan);text-shadow:0 0 10px rgba(0,229,255,.5);padding-right:8px;border-right:1px solid var(--border);flex-shrink:0;}
.hav{width:28px;height:28px;border:1px solid var(--border);border-radius:2px;background:rgba(0,229,255,.07);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.hun{display:flex;flex-direction:column;padding-right:8px;border-right:1px solid var(--border);flex-shrink:0;}
.hun-n{font-family:var(--fh);font-size:10px;font-weight:700;color:#fff;letter-spacing:1px;}
.hun-t{font-size:8px;color:rgba(0,229,255,.4);letter-spacing:1px;}
.hres{display:flex;gap:6px;padding-right:8px;border-right:1px solid var(--border);}
.hr{display:flex;flex-direction:column;align-items:center;}
.hr-l{font-size:7px;letter-spacing:1px;color:rgba(255,255,255,.3);text-transform:uppercase;}
.hr-v{font-family:var(--fh);font-size:10px;font-weight:700;}
.hr-v.c{color:var(--gold);}
.hr-v.m{color:#78909c;}
.hr-v.e{color:#80cbc4;}
.hvl{font-family:var(--fh);font-size:8px;letter-spacing:2px;color:rgba(0,229,255,.3);text-transform:uppercase;}
.hright{margin-left:auto;display:flex;gap:5px;}
.hb{padding:4px 8px;font-family:var(--fh);font-size:8px;letter-spacing:1px;border-radius:2px;border:1px solid var(--border);background:transparent;color:var(--cyan);cursor:pointer;transition:all .2s;text-transform:uppercase;}
.hb:hover,.hb:active{background:rgba(0,229,255,.08);}
.hb.r{border-color:rgba(255,23,68,.3);color:var(--red);}

/* ZOOM CONTROLS - right side */
#zc{position:fixed;right:10px;bottom:60px;z-index:20;display:flex;flex-direction:column;gap:6px;}
.zb{width:40px;height:40px;background:rgba(0,1,10,.92);border:1px solid var(--border);border-radius:2px;color:var(--cyan);font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;font-family:var(--fh);}
.zb:active{background:rgba(0,229,255,.12);transform:scale(.93);}
.zb.fit{font-size:9px;letter-spacing:1px;}

/* BOTTOM BAR */
#bb{
  position:fixed;bottom:0;left:0;right:0;z-index:20;height:42px;
  background:linear-gradient(0deg,rgba(0,1,10,.97) 0%,rgba(0,1,10,.75) 100%);
  border-top:1px solid var(--border);
  backdrop-filter:blur(12px);
  display:flex;align-items:center;padding:0 10px;gap:10px;
}
.bb-i{display:flex;align-items:center;gap:4px;font-size:9px;color:rgba(255,255,255,.35);}
.bb-d{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.bb-z{margin-left:auto;font-family:var(--fh);font-size:9px;color:rgba(0,229,255,.35);letter-spacing:1px;}

/* MINIMAP */
#mm{
  position:fixed;left:10px;bottom:52px;z-index:20;
  width:110px;height:85px;
  background:rgba(0,1,10,.9);border:1px solid var(--border);border-radius:2px;overflow:hidden;
}
#mmc{width:100%;height:100%;display:block;}
.mml{position:absolute;top:3px;left:4px;font-family:var(--fh);font-size:7px;letter-spacing:1px;color:rgba(0,229,255,.3);text-transform:uppercase;}

/* GALAXY ENTER PROMPT */
#ep{
  position:fixed;bottom:52px;left:50%;transform:translateX(-50%);z-index:25;
  background:rgba(0,1,15,.95);border:1px solid rgba(0,229,255,.4);border-radius:2px;
  padding:8px 16px;font-family:var(--fh);font-size:10px;letter-spacing:2px;
  color:var(--cyan);text-transform:uppercase;display:none;cursor:pointer;
  animation:epPulse 1.5s ease-in-out infinite;white-space:nowrap;
}
@keyframes epPulse{0%,100%{border-color:rgba(0,229,255,.3);opacity:.8;}50%{border-color:rgba(0,229,255,.9);opacity:1;}}

/* TOOLTIP */
#tip{
  position:fixed;z-index:30;background:rgba(0,1,15,.96);
  border:1px solid var(--border);border-radius:2px;padding:8px 12px;
  pointer-events:none;display:none;min-width:140px;
  backdrop-filter:blur(12px);
}
.tip-n{font-family:var(--fh);font-size:11px;font-weight:700;color:#fff;margin-bottom:3px;}
.tip-t{font-size:9px;color:rgba(0,229,255,.45);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px;}
.tip-s{font-size:10px;color:rgba(255,255,255,.4);}
.tip-st{font-size:9px;margin-top:3px;}
.tip-st.h{color:var(--gold);}
.tip-st.e{color:var(--green);}
.tip-st.u{color:rgba(255,255,255,.25);}

/* LOADING */
#load{
  position:fixed;inset:0;z-index:100;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
}
.load-t{font-family:var(--fh);font-size:clamp(28px,8vw,48px);font-weight:900;letter-spacing:4px;color:var(--cyan);text-shadow:0 0 30px rgba(0,229,255,.7);animation:lp 2s ease-in-out infinite;}
@keyframes lp{0%,100%{opacity:.7;}50%{opacity:1;}}
.load-bw{width:180px;height:3px;background:rgba(0,229,255,.1);border-radius:2px;overflow:hidden;}
.load-b{height:100%;width:0%;background:linear-gradient(90deg,var(--cyan),var(--purple));transition:width .3s;border-radius:2px;}
.load-tx{font-family:var(--fh);font-size:9px;letter-spacing:3px;color:rgba(0,229,255,.4);text-transform:uppercase;}

/* TOASTS */
#ts{position:fixed;top:56px;left:50%;transform:translateX(-50%);z-index:50;display:flex;flex-direction:column;align-items:center;gap:5px;pointer-events:none;}
.t{padding:6px 14px;background:rgba(0,1,15,.96);border:1px solid var(--border);border-radius:2px;font-family:var(--fh);font-size:9px;letter-spacing:1px;white-space:nowrap;animation:tI .22s ease,tO .28s ease 2.4s forwards;}
.t.ok{border-color:rgba(0,230,118,.4);color:var(--green);}
.t.err{border-color:rgba(255,23,68,.4);color:var(--red);}
.t.inf{border-color:rgba(0,229,255,.35);color:var(--cyan);}
@keyframes tI{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
@keyframes tO{from{opacity:1}to{opacity:0}}

/* TRANSITION */
#zt{position:fixed;inset:0;z-index:90;background:radial-gradient(circle at 50% 50%,rgba(0,229,255,.25) 0%,rgba(0,1,10,1) 70%);opacity:0;pointer-events:none;transition:opacity .5s;}
#zt.on{opacity:1;pointer-events:all;}
</style>
</head>
<body>

<div id="load">
  <div class="load-t">VOID DOMINION</div>
  <div class="load-bw"><div class="load-b" id="lb"></div></div>
  <div class="load-tx" id="lt">Initializing universe...</div>
</div>

<canvas id="cv"></canvas>
<div id="zt"></div>

<!-- HUD -->
<div id="hud">
  <div class="hl">VD</div>
  <div class="hav" id="hav">&#128737;</div>
  <div class="hun"><div class="hun-n" id="hun">-</div><div class="hun-t" id="htag">-</div></div>
  <div class="hres">
    <div class="hr"><div class="hr-l">CR</div><div class="hr-v c" id="hcr">0</div></div>
    <div class="hr"><div class="hr-l">MIN</div><div class="hr-v m" id="hmn">0</div></div>
    <div class="hr"><div class="hr-l">ENE</div><div class="hr-v e" id="hen">0</div></div>
  </div>
  <div class="hvl">Universe</div>
  <div class="hright">
    <button class="hb r" onclick="doLogout()">Exit</button>
  </div>
</div>

<!-- Galaxy Tooltip -->
<div id="tip">
  <div class="tip-n" id="tn">-</div>
  <div class="tip-t" id="tt">-</div>
  <div class="tip-s" id="ts2">-</div>
  <div class="tip-st" id="tst">-</div>
</div>

<!-- Enter Prompt -->
<div id="ep" onclick="enterGalaxy()">TAP TO ENTER</div>

<!-- Bottom Bar -->
<div id="bb">
  <div class="bb-i"><div class="bb-d" style="background:var(--gold);box-shadow:0 0 5px var(--gold)"></div>Home</div>
  <div class="bb-i"><div class="bb-d" style="background:var(--green)"></div>Explored</div>
  <div class="bb-i"><div class="bb-d" style="background:rgba(255,255,255,.2)"></div>Unknown</div>
  <div class="bb-z" id="bzoom">1.00x</div>
</div>

<!-- Zoom Controls -->
<div id="zc">
  <button class="zb" id="zin">+</button>
  <button class="zb" id="zout">-</button>
  <button class="zb fit" id="zfit">FIT</button>
</div>

<!-- Minimap -->
<div id="mm">
  <canvas id="mmc"></canvas>
  <div class="mml">UNIVERSE</div>
</div>

<!-- Toasts -->
<div id="ts"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
const sb = createClient(
  'https://xeetrcygnlpjzkkwpnvf.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhlZXRyY3lnbmxwanpra3dwbnZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTYzMjksImV4cCI6MjA4OTU3MjMyOX0.fMB2eCVdXDYrcgcVyuwIjbYH2-yatEGaMa2NzZdkh4o'
);

// ═══ CONSTANTS ═══
const AVATARS = ['&#128737;','&#128125;','&#129302;','&#128123;','&#129330;','&#128520;','&#129351;','&#128081;'];
const G_TYPES = ['Spiral','Elliptical','Irregular','Barred Spiral','Lenticular','Dwarf'];
const NA = ['Andromeda','Orion','Cygnus','Lyra','Perseus','Aquila','Vega','Rigel','Sirius','Altair','Deneb','Arcturus','Spica','Antares','Aldebaran','Pollux','Castor','Regulus','Elnath','Mirach'];
const NB = ['Nexus','Prime','Deep','Core','Reach','Fringe','Expanse','Void','Drift','Surge','Pulse','Echo','Shadow','Blaze','Storm','Edge','Haven','Sanctum','Domain','Empire'];
const GCOLS = [
  [100,180,255],[255,220,150],[180,120,255],
  [100,255,180],[255,160,100],[200,200,255]
];

// ═══ STATE ═══
let cv, cx, mc, mx2;
let W, H;
let cam = { x:0, y:0, s:1 };
let UW = 3000, UH = 2400; // universe dimensions
let galaxies = [];
let selG = null;
let drag = { on:false, sx:0, sy:0, ox:0, oy:0 };
let raf = null;
let profile = null;
let homeIdx = 0;

// ═══ UTILS ═══
const $  = id => document.getElementById(id);
function seededRng(seed){
  let s = (seed < 0 ? -seed : seed) % 2147483647;
  if(s === 0) s = 1;
  return ()=>{ s = s*16807 % 2147483647; return (s-1)/2147483646; };
}
function hash(str){
  let h=5381;
  for(let i=0;i<str.length;i++) h=(h*33^str.charCodeAt(i))>>>0;
  return h;
}
function toast(msg,type='inf'){
  const t=document.createElement('div');
  t.className='t '+type; t.textContent=msg;
  $('ts').appendChild(t);
  setTimeout(()=>t.remove(),3000);
}
function setLoad(p,txt){
  $('lb').style.width=p+'%';
  $('lt').textContent=txt;
}
function fmt(n){
  if(n>=1e6) return (n/1e6).toFixed(1)+'M';
  if(n>=1e3) return (n/1e3).toFixed(1)+'K';
  return ''+n;
}

// ═══ GENERATE GALAXIES ═══
function buildGalaxies(seed){
  const rng = seededRng(seed);
  const list = [];
  const N = 240;
  let tries = 0;
  while(list.length < N && tries < N*30){
    tries++;
    const x = 80 + rng()*(UW-160);
    const y = 80 + rng()*(UH-160);
    // min spacing
    let ok = true;
    for(const g of list){
      if(Math.hypot(g.x-x,g.y-y) < 70){ ok=false; break; }
    }
    if(!ok) continue;
    const ti = Math.floor(rng()*G_TYPES.length);
    const col = GCOLS[ti];
    list.push({
      id:list.length,
      x, y,
      size: 18+rng()*22,
      name: NA[Math.floor(rng()*NA.length)]+' '+NB[Math.floor(rng()*NB.length)],
      type: G_TYPES[ti],
      systems: 280+Math.floor(rng()*120),
      cr: col[0], cg: col[1], cb: col[2],
      arms: (ti===0||ti===3)?2+Math.floor(rng()*2):0,
      rot: rng()*Math.PI*2,
      rotsp: (rng()-.5)*0.0003,
      twink: rng()*Math.PI*2,
      bright: 0.55+rng()*0.45,
      explored: false,
      isHome: false,
    });
  }
  return list;
}

// ═══ CAMERA ═══
function fitView(){
  if(!cv) return;
  const pad = 60;
  const sw = cv.width - pad*2;
  const sh = cv.height - 100; // account for HUD + bottom bar
  cam.s = Math.min(sw/UW, sh/UH)*0.92;
  cam.x = (cv.width - UW*cam.s)/2;
  cam.y = 48 + (sh - UH*cam.s)/2; // below HUD
  clamp();
}
function clamp(){
  cam.s = Math.max(0.12, Math.min(3.5, cam.s));
}
function w2s(wx,wy){ return {x:wx*cam.s+cam.x, y:wy*cam.s+cam.y}; }
function s2w(sx,sy){ return {x:(sx-cam.x)/cam.s, y:(sy-cam.y)/cam.s}; }

// ═══ RENDER ═══
function startRender(){
  if(raf) return;
  (function loop(t){
    raf = requestAnimationFrame(loop);
    render(t);
    renderMini();
  })();
}

function render(t){
  if(!cx||!galaxies.length) return;
  cx.clearRect(0,0,W,H);
  cx.fillStyle='#00010a';
  cx.fillRect(0,0,W,H);

  // Nebula background
  drawNebula();

  cx.save();
  cx.translate(cam.x, cam.y);
  cx.scale(cam.s, cam.s);

  // Draw all galaxies
  for(const g of galaxies) drawG(cx, g, t);

  // Connection lines between explored
  if(cam.s > 0.25){
    for(let i=0;i<galaxies.length;i++){
      const a=galaxies[i];
      if(!a.explored&&!a.isHome) continue;
      for(let j=i+1;j<galaxies.length;j++){
        const b=galaxies[j];
        if(!b.explored&&!b.isHome) continue;
        const d=Math.hypot(a.x-b.x,a.y-b.y);
        if(d>320) continue;
        cx.beginPath();
        cx.moveTo(a.x,a.y);cx.lineTo(b.x,b.y);
        cx.strokeStyle=`rgba(0,229,255,${0.05*(1-d/320)})`;
        cx.lineWidth=0.8/cam.s;
        cx.stroke();
      }
    }
  }

  cx.restore();
  $('bzoom').textContent=cam.s.toFixed(2)+'x';
}

function drawNebula(){
  const g1=cx.createRadialGradient(W*.2,H*.3,0,W*.2,H*.3,W*.4);
  g1.addColorStop(0,'rgba(124,58,237,0.07)');g1.addColorStop(1,'transparent');
  cx.fillStyle=g1;cx.fillRect(0,0,W,H);
  const g2=cx.createRadialGradient(W*.8,H*.7,0,W*.8,H*.7,W*.3);
  g2.addColorStop(0,'rgba(0,229,255,0.05)');g2.addColorStop(1,'transparent');
  cx.fillStyle=g2;cx.fillRect(0,0,W,H);
}

function drawG(cx, g, t){
  const p = 0.5+0.5*Math.sin(t*.001+g.twink);
  const s = g.size;
  cx.save();
  cx.translate(g.x, g.y);

  if(!g.explored && !g.isHome){
    // Unknown — very dim
    const grd=cx.createRadialGradient(0,0,0,0,0,s*2);
    grd.addColorStop(0,`rgba(150,150,200,${0.07+p*.04})`);
    grd.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=grd;
    cx.beginPath();cx.arc(0,0,s*2,0,Math.PI*2);cx.fill();
    // Tiny dim core
    const core=cx.createRadialGradient(0,0,0,0,0,s*.35);
    core.addColorStop(0,`rgba(180,180,210,${0.2+p*.08})`);
    core.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=core;
    cx.beginPath();cx.arc(0,0,s*.35,0,Math.PI*2);cx.fill();
  } else {
    // Explored / home — full color
    const col=`${g.cr},${g.cg},${g.cb}`;
    const glowA=0.35+p*.25;

    // Outer halo
    const halo=cx.createRadialGradient(0,0,0,0,0,s*2.5);
    halo.addColorStop(0,`rgba(${col},${glowA*.5})`);
    halo.addColorStop(0.5,`rgba(${col},${glowA*.2})`);
    halo.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=halo;
    cx.beginPath();cx.arc(0,0,s*2.5,0,Math.PI*2);cx.fill();

    // Main glow
    const grd=cx.createRadialGradient(0,0,0,0,0,s*1.5);
    grd.addColorStop(0,`rgba(${col},${glowA})`);
    grd.addColorStop(0.6,`rgba(${col},${glowA*.3})`);
    grd.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=grd;
    cx.beginPath();cx.arc(0,0,s*1.5,0,Math.PI*2);cx.fill();

    // Bright core
    const core=cx.createRadialGradient(0,0,0,0,0,s*.55);
    core.addColorStop(0,`rgba(255,255,255,${g.bright*.85})`);
    core.addColorStop(0.4,`rgba(${col},${g.bright*.7})`);
    core.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=core;
    cx.beginPath();cx.arc(0,0,s*.55,0,Math.PI*2);cx.fill();

    // Spiral arms
    if(g.arms>0){
      cx.save();
      cx.rotate(g.rot + t*g.rotsp);
      for(let arm=0;arm<g.arms;arm++){
        cx.save();
        cx.rotate((Math.PI*2/g.arms)*arm);
        for(let i=0;i<18;i++){
          const f=i/18;
          const ang=f*Math.PI*1.7;
          const r2=s*.3+f*s*.85;
          cx.beginPath();
          cx.arc(Math.cos(ang)*r2,Math.sin(ang)*r2,(1-f)*s*.17+.5,0,Math.PI*2);
          cx.fillStyle=`rgba(${col},${g.bright*(.55-f*.35)})`;
          cx.fill();
        }
        cx.restore();
      }
      cx.restore();
    }

    // Star sparkles
    for(let i=0;i<6;i++){
      const a2=(i/6)*Math.PI*2+g.rot;
      const d=s*(.25+Math.abs(Math.sin(i*1.7))*.45);
      cx.beginPath();
      cx.arc(Math.cos(a2)*d,Math.sin(a2)*d,s*.055,0,Math.PI*2);
      cx.fillStyle=`rgba(255,255,255,${g.bright*.5})`;
      cx.fill();
    }
  }

  // Home ring
  if(g.isHome){
    cx.beginPath();cx.arc(0,0,s*1.9,0,Math.PI*2);
    cx.strokeStyle=`rgba(255,196,0,${.35+p*.25})`;
    cx.lineWidth=1.8/cam.s;cx.stroke();
    cx.beginPath();cx.arc(0,0,s*2.4,0,Math.PI*2);
    cx.strokeStyle=`rgba(255,196,0,${.12+p*.1})`;
    cx.lineWidth=.8/cam.s;cx.stroke();
  }

  // Selected ring
  if(selG && selG.id===g.id){
    cx.beginPath();cx.arc(0,0,s*1.7,0,Math.PI*2);
    cx.strokeStyle=`rgba(255,255,255,${.5+p*.3})`;
    cx.lineWidth=1.5/cam.s;cx.stroke();
    cx.setLineDash([4/cam.s,3/cam.s]);
    cx.beginPath();cx.arc(0,0,s*2.1,0,Math.PI*2);
    cx.strokeStyle=`rgba(255,255,255,${.18+p*.1})`;
    cx.lineWidth=.7/cam.s;cx.stroke();
    cx.setLineDash([]);
  }

  // Label
  if(cam.s>0.45 && (g.explored||g.isHome)){
    cx.textAlign='center';cx.textBaseline='top';
    cx.font=`bold ${Math.min(12,10/cam.s)}px Orbitron,monospace`;
    cx.fillStyle=g.isHome?`rgba(255,196,0,${.75+p*.2})`:`rgba(255,255,255,${.5+p*.15})`;
    cx.fillText(g.name,0,s*1.15+3/cam.s);
  }

  cx.restore();
}

function renderMini(){
  if(!mx2) return;
  const MW=110,MH=85;
  mx2.clearRect(0,0,MW,MH);
  mx2.fillStyle='rgba(0,1,10,.92)';mx2.fillRect(0,0,MW,MH);
  const sx=MW/UW, sy=MH/UH;
  for(const g of galaxies){
    mx2.beginPath();
    mx2.arc(g.x*sx, g.y*sy, g.isHome?2.8:1.6, 0, Math.PI*2);
    if(g.isHome) mx2.fillStyle='rgba(255,196,0,.9)';
    else if(g.explored) mx2.fillStyle=`rgba(${g.cr},${g.cg},${g.cb},.6)`;
    else mx2.fillStyle='rgba(90,90,110,.2)';
    mx2.fill();
  }
  // Viewport
  if(cv){
    const vx=(-cam.x/cam.s)*sx, vy=(-cam.y/cam.s)*sy;
    const vw=(cv.width/cam.s)*sx, vh=(cv.height/cam.s)*sy;
    mx2.strokeStyle='rgba(0,229,255,.4)';mx2.lineWidth=1;
    mx2.strokeRect(vx,vy,vw,vh);
  }
}

// ═══ GALAXY AT POSITION ═══
function galaxyAt(wx,wy){
  let best=null, bd=Infinity;
  for(const g of galaxies){
    const d=Math.hypot(g.x-wx,g.y-wy);
    const hit=Math.max(g.size*2.5, 35/cam.s);
    if(d<hit&&d<bd){bd=d;best=g;}
  }
  return best;
}

// ═══ TOOLTIP ═══
function showTip(g,sx,sy){
  if(!g){$('tip').style.display='none';return;}
  $('tn').textContent=g.name;
  $('tt').textContent=g.type+' Galaxy';
  $('ts2').textContent=(g.explored||g.isHome)?g.systems+' Solar Systems':'??? Solar Systems';
  const st=$('tst');
  if(g.isHome){st.textContent='HOME GALAXY';st.className='tip-st h';}
  else if(g.explored){st.textContent='EXPLORED';st.className='tip-st e';}
  else{st.textContent='UNKNOWN';st.className='tip-st u';}
  const tip=$('tip');
  tip.style.display='block';
  tip.style.left=Math.min(sx+14,W-160)+'px';
  tip.style.top=Math.max(55,Math.min(sy-30,H-120))+'px';
}

// ═══ TAP / CLICK ═══
function onTap(sx,sy){
  const w=s2w(sx,sy);
  const g=galaxyAt(w.x,w.y);
  if(g){
    selG=g;
    $('ep').style.display='block';
    $('ep').textContent='ENTER: '+g.name.toUpperCase();
    showTip(g,sx,sy);
    toast(g.name+(g.isHome?' — HOME':(g.explored?' — Explored':' — Unknown')),'inf');
  } else {
    selG=null;
    $('ep').style.display='none';
    $('tip').style.display='none';
  }
}

window.enterGalaxy=function(){
  if(!selG) return;
  $('zt').classList.add('on');
  setTimeout(()=>{
    selG.explored=true;
    toast('Entering '+selG.name+' — Galaxy view coming soon!','ok');
    $('zt').classList.remove('on');
    $('ep').style.display='none';
    selG=null;
  },600);
};

// ═══ INPUT ═══
function initInput(){
  // Mouse
  cv.addEventListener('mousedown',e=>{
    drag.on=true;drag.sx=e.clientX;drag.sy=e.clientY;drag.ox=cam.x;drag.oy=cam.y;
  });
  cv.addEventListener('mousemove',e=>{
    if(drag.on){
      cam.x=drag.ox+(e.clientX-drag.sx);
      cam.y=drag.oy+(e.clientY-drag.sy);
      clamp();
    } else {
      const w=s2w(e.clientX,e.clientY);
      showTip(galaxyAt(w.x,w.y),e.clientX,e.clientY);
    }
  });
  cv.addEventListener('mouseup',e=>{
    const moved=Math.abs(e.clientX-drag.sx)+Math.abs(e.clientY-drag.sy);
    if(moved<5) onTap(e.clientX,e.clientY);
    drag.on=false;
  });

  // Touch
  let tp=null, pinchD=0;
  cv.addEventListener('touchstart',e=>{
    e.preventDefault();
    if(e.touches.length===1){
      drag.on=true;
      drag.sx=e.touches[0].clientX;drag.sy=e.touches[0].clientY;
      drag.ox=cam.x;drag.oy=cam.y;
      tp={x:e.touches[0].clientX,y:e.touches[0].clientY};
    }
    if(e.touches.length===2){
      drag.on=false;
      pinchD=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    }
  },{passive:false});
  cv.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(e.touches.length===1&&drag.on){
      cam.x=drag.ox+(e.touches[0].clientX-drag.sx);
      cam.y=drag.oy+(e.touches[0].clientY-drag.sy);
      clamp();
    }
  },{passive:false});
  cv.addEventListener('touchend',e=>{
    e.preventDefault();
    if(drag.on&&e.changedTouches.length===1&&tp){
      const dx=Math.abs(e.changedTouches[0].clientX-tp.x);
      const dy=Math.abs(e.changedTouches[0].clientY-tp.y);
      if(dx+dy<10) onTap(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
    }
    drag.on=false;tp=null;
  },{passive:false});

  // Zoom buttons
  $('zin').onclick=()=>zoomAt(1.3);
  $('zout').onclick=()=>zoomAt(0.77);
  $('zfit').onclick=()=>{ fitView(); centerHome(); };
}

function zoomAt(factor){
  const cx2=cv.width/2, cy2=cv.height/2;
  const wx=(cx2-cam.x)/cam.s, wy=(cy2-cam.y)/cam.s;
  cam.s*=factor;clamp();
  cam.x=cx2-wx*cam.s;cam.y=cy2-wy*cam.s;
}

function centerHome(){
  const hg=galaxies[homeIdx];
  if(!hg) return;
  cam.x=cv.width/2-hg.x*cam.s;
  cam.y=cv.height/2-hg.y*cam.s;
}

// ═══ RESIZE ═══
function resize(){
  W=cv.width=window.innerWidth;
  H=cv.height=window.innerHeight;
  mc.width=110;mc.height=85;
}

// ═══ LOGOUT ═══
window.doLogout=async function(){
  if(!confirm('Logout?')) return;
  await sb.auth.signOut();
  window.location.href='https://amitmukherjee626-rgb.github.io/void-dominion/';
};

// ═══ INIT ═══
async function init(){
  setLoad(10,'Connecting...');
  await new Promise(r=>setTimeout(r,200));

  setLoad(25,'Authenticating...');
  let session;
  try{
    const res=await sb.auth.getSession();
    session=res.data.session;
  }catch(e){
    window.location.href='https://amitmukherjee626-rgb.github.io/void-dominion/';
    return;
  }
  if(!session?.user){
    window.location.href='https://amitmukherjee626-rgb.github.io/void-dominion/';
    return;
  }

  setLoad(45,'Loading profile...');
  const {data:prof}=await sb.from('players').select('*').eq('id',session.user.id).maybeSingle();
  profile=prof;

  // HUD
  const ai=(prof?.avatar_id||1)-1;
  $('hav').innerHTML=AVATARS[ai]||AVATARS[0];
  $('hun').textContent=prof?.username||'Commander';
  $('htag').textContent=prof?.player_tag||'#VD-00000';
  $('hcr').textContent=fmt(prof?.credits||0);
  $('hmn').textContent=fmt(prof?.minerals||0);
  $('hen').textContent=fmt(prof?.energy||0);

  setLoad(65,'Generating universe...');
  await new Promise(r=>setTimeout(r,150));
  const seed=hash(session.user.id);
  galaxies=buildGalaxies(seed);

  setLoad(80,'Locating home system...');
  await new Promise(r=>setTimeout(r,150));
  homeIdx=seed%galaxies.length;
  galaxies[homeIdx].isHome=true;
  galaxies[homeIdx].explored=true;
  // Explore nearby
  let ex=0;
  for(const g of galaxies){
    if(g.id===homeIdx) continue;
    if(Math.hypot(g.x-galaxies[homeIdx].x,g.y-galaxies[homeIdx].y)<280&&ex<5){
      g.explored=true;ex++;
    }
  }

  setLoad(92,'Rendering...');
  await new Promise(r=>setTimeout(r,100));

  // Canvas setup
  cv=$('cv');cx=cv.getContext('2d');
  mc=$('mmc');mx2=mc.getContext('2d');

  resize();
  window.addEventListener('resize',()=>{ resize(); });

  // Fit and center home
  fitView();
  cam.s=0.4;
  centerHome();

  initInput();

  setLoad(100,'Universe ready!');
  await new Promise(r=>setTimeout(r,350));

  // Hide loading
  const ld=$('load');
  ld.style.transition='opacity .5s';
  ld.style.opacity='0';
  setTimeout(()=>ld.style.display='none',500);

  startRender();
  toast('Welcome '+(prof?.username||'Commander')+'! Gold ring = Home Galaxy','ok');
}

init();
</script>
