<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VOID DOMINION</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;height:100%;
  background:#00010a;
  overflow:hidden;
  font-family:'Exo 2',sans-serif;
  color:#d0eeff;
  touch-action:none;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
  overscroll-behavior:none;
}
canvas#cv{
  display:block;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  z-index:1;
  touch-action:none;
}
/* ─── HUD TOP ─── */
#hud{
  position:fixed;top:0;left:0;right:0;
  height:50px;z-index:10;
  background:rgba(0,1,10,0.96);
  border-bottom:1px solid rgba(0,229,255,0.15);
  display:flex;align-items:center;
  padding:0 10px;gap:8px;
  pointer-events:all;
}
.hl{font-family:'Orbitron',monospace;font-size:11px;font-weight:900;letter-spacing:2px;color:#00e5ff;text-shadow:0 0 8px rgba(0,229,255,0.6);padding-right:8px;border-right:1px solid rgba(0,229,255,0.15);flex-shrink:0;}
.hav{width:28px;height:28px;border:1px solid rgba(0,229,255,0.2);border-radius:2px;background:rgba(0,229,255,0.06);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.hinfo{display:flex;flex-direction:column;padding-right:8px;border-right:1px solid rgba(0,229,255,0.15);flex-shrink:0;}
.hname{font-family:'Orbitron',monospace;font-size:10px;font-weight:700;color:#fff;letter-spacing:1px;}
.htag{font-size:8px;color:rgba(0,229,255,0.4);letter-spacing:1px;}
.hres{display:flex;gap:8px;padding-right:8px;border-right:1px solid rgba(0,229,255,0.15);}
.hr{display:flex;flex-direction:column;align-items:center;}
.hrl{font-size:7px;letter-spacing:1px;color:rgba(255,255,255,0.3);text-transform:uppercase;}
.hrv{font-family:'Orbitron',monospace;font-size:10px;font-weight:700;}
.hrv.cr{color:#ffc400;} .hrv.mn{color:#78909c;} .hrv.en{color:#80cbc4;}
.hvw{font-family:'Orbitron',monospace;font-size:8px;letter-spacing:2px;color:rgba(0,229,255,0.35);text-transform:uppercase;}
.hright{margin-left:auto;display:flex;gap:6px;}
.hbtn{padding:5px 9px;font-family:'Orbitron',monospace;font-size:8px;letter-spacing:1px;border-radius:2px;border:1px solid rgba(255,23,68,0.35);background:transparent;color:#ff1744;cursor:pointer;text-transform:uppercase;}

/* ─── ZOOM BUTTONS ─── */
#zctrl{
  position:fixed;right:12px;bottom:55px;
  z-index:10;display:flex;flex-direction:column;gap:6px;
  pointer-events:all;
}
.zbtn{
  width:44px;height:44px;
  background:rgba(0,1,10,0.94);
  border:1px solid rgba(0,229,255,0.2);
  border-radius:3px;
  color:#00e5ff;
  font-size:20px;font-weight:700;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',monospace;
  -webkit-tap-highlight-color:transparent;
}
.zbtn.fit{font-size:9px;letter-spacing:1px;}

/* ─── BOTTOM BAR ─── */
#bbar{
  position:fixed;bottom:0;left:0;right:0;
  height:44px;z-index:10;
  background:rgba(0,1,10,0.96);
  border-top:1px solid rgba(0,229,255,0.15);
  display:flex;align-items:center;
  padding:0 12px;gap:12px;
  pointer-events:none;
}
.bli{display:flex;align-items:center;gap:4px;font-size:9px;color:rgba(255,255,255,0.35);}
.bld{width:7px;height:7px;border-radius:50%;}
.blz{margin-left:auto;font-family:'Orbitron',monospace;font-size:9px;color:rgba(0,229,255,0.35);letter-spacing:1px;}

/* ─── MINIMAP ─── */
#mmap{
  position:fixed;left:12px;bottom:54px;
  width:120px;height:92px;z-index:10;
  background:rgba(0,1,10,0.92);
  border:1px solid rgba(0,229,255,0.18);
  border-radius:2px;overflow:hidden;
  pointer-events:none;
}
#mmc{display:block;width:100%;height:100%;}
.mmtxt{position:absolute;top:3px;left:5px;font-family:'Orbitron',monospace;font-size:7px;letter-spacing:1px;color:rgba(0,229,255,0.3);}

/* ─── ENTER PROMPT ─── */
#eprompt{
  position:fixed;bottom:54px;left:50%;
  transform:translateX(-50%);
  z-index:10;
  background:rgba(0,1,15,0.96);
  border:1px solid rgba(0,229,255,0.5);
  border-radius:2px;
  padding:8px 18px;
  font-family:'Orbitron',monospace;
  font-size:10px;letter-spacing:2px;
  color:#00e5ff;
  text-transform:uppercase;
  display:none;
  white-space:nowrap;
  cursor:pointer;
  animation:pulse 1.5s ease-in-out infinite;
  pointer-events:all;
}
@keyframes pulse{0%,100%{border-color:rgba(0,229,255,0.3);}50%{border-color:rgba(0,229,255,1);box-shadow:0 0 12px rgba(0,229,255,0.4);}}

/* ─── TOOLTIP ─── */
#gtip{
  position:fixed;z-index:15;
  background:rgba(0,1,15,0.97);
  border:1px solid rgba(0,229,255,0.2);
  border-radius:2px;padding:8px 12px;
  pointer-events:none;display:none;
  min-width:145px;max-width:200px;
}
.gtn{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;color:#fff;margin-bottom:3px;}
.gtt{font-size:9px;color:rgba(0,229,255,0.5);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px;}
.gts{font-size:10px;color:rgba(255,255,255,0.4);}
.gtst{font-size:9px;margin-top:3px;}
.gtst.h{color:#ffc400;} .gtst.e{color:#00e676;} .gtst.u{color:rgba(255,255,255,0.25);}

/* ─── TOASTS ─── */
#toasts{position:fixed;top:58px;left:50%;transform:translateX(-50%);z-index:20;display:flex;flex-direction:column;align-items:center;gap:4px;pointer-events:none;}
.toast{padding:6px 14px;background:rgba(0,1,15,0.97);border:1px solid rgba(0,229,255,0.2);border-radius:2px;font-family:'Orbitron',monospace;font-size:9px;letter-spacing:1px;white-space:nowrap;animation:tIn .2s ease,tOut .3s ease 2.5s forwards;}
.toast.ok{border-color:rgba(0,230,118,0.5);color:#00e676;}
.toast.err{border-color:rgba(255,23,68,0.5);color:#ff1744;}
.toast.inf{border-color:rgba(0,229,255,0.4);color:#00e5ff;}
@keyframes tIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
@keyframes tOut{to{opacity:0}}

/* ─── LOADING ─── */
#loadscr{
  position:fixed;inset:0;z-index:100;
  background:#00010a;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:18px;
}
.ltitle{font-family:'Orbitron',monospace;font-size:clamp(26px,7vw,44px);font-weight:900;letter-spacing:4px;color:#00e5ff;text-shadow:0 0 25px rgba(0,229,255,0.7);animation:lpulse 2s ease-in-out infinite;}
@keyframes lpulse{0%,100%{opacity:0.7}50%{opacity:1}}
.lbarw{width:200px;height:3px;background:rgba(0,229,255,0.1);border-radius:2px;overflow:hidden;}
.lbar{height:100%;width:0%;background:linear-gradient(90deg,#00e5ff,#7c3aed);transition:width 0.4s ease;border-radius:2px;}
.ltxt{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:3px;color:rgba(0,229,255,0.4);text-transform:uppercase;}

/* ─── ZOOM TRANSITION ─── */
#ztrans{position:fixed;inset:0;z-index:90;background:radial-gradient(circle at 50% 50%,rgba(0,229,255,0.2) 0%,rgba(0,1,10,1) 65%);opacity:0;pointer-events:none;transition:opacity 0.5s;}
#ztrans.show{opacity:1;pointer-events:all;}
</style>
</head>
<body>

<div id="loadscr">
  <div class="ltitle">VOID DOMINION</div>
  <div class="lbarw"><div class="lbar" id="lbar"></div></div>
  <div class="ltxt" id="ltxt">Initializing...</div>
</div>

<canvas id="cv"></canvas>
<div id="ztrans"></div>

<div id="hud">
  <div class="hl">VD</div>
  <div class="hav" id="hav">&#128737;</div>
  <div class="hinfo">
    <div class="hname" id="hname">-</div>
    <div class="htag" id="htag">-</div>
  </div>
  <div class="hres">
    <div class="hr"><div class="hrl">CR</div><div class="hrv cr" id="hcr">0</div></div>
    <div class="hr"><div class="hrl">MIN</div><div class="hrv mn" id="hmn">0</div></div>
    <div class="hr"><div class="hrl">ENE</div><div class="hrv en" id="hen">0</div></div>
  </div>
  <div class="hvw">Universe</div>
  <div class="hright">
    <button class="hbtn" onclick="goHome()" style="border-color:rgba(0,229,255,0.5);margin-right:4px;">&#127968; HOME</button>
    <button class="hbtn" onclick="doLogout()">EXIT</button>
  </div>
</div>

<div id="zctrl">
  <button class="zbtn" id="zbtn-in">+</button>
  <button class="zbtn" id="zbtn-out">&#8722;</button>
  <button class="zbtn fit" id="zbtn-fit">FIT</button>
</div>

<div id="bbar">
  <div class="bli"><div class="bld" style="background:#ffc400;box-shadow:0 0 5px #ffc400"></div>Home</div>
  <div class="bli"><div class="bld" style="background:#00e676"></div>Explored</div>
  <div class="bli"><div class="bld" style="background:rgba(255,255,255,0.2)"></div>Unknown</div>
  <div class="blz" id="bzoom">0.40x</div>
</div>

<div id="mmap">
  <canvas id="mmc"></canvas>
  <div class="mmtxt">UNIVERSE</div>
</div>

<div id="eprompt" onclick="enterGalaxy()">TAP TO ENTER</div>
<div id="gtip">
  <div class="gtn" id="gtn">-</div>
  <div class="gtt" id="gtt">-</div>
  <div class="gts" id="gts">-</div>
  <div class="gtst" id="gtst">-</div>
</div>
<div id="toasts"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
const SB = createClient(
  'https://xeetrcygnlpjzkkwpnvf.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhlZXRyY3lnbmxwanpra3dwbnZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTYzMjksImV4cCI6MjA4OTU3MjMyOX0.fMB2eCVdXDYrcgcVyuwIjbYH2-yatEGaMa2NzZdkh4o'
);

// ════ CONSTANTS ════
const AVATARS=['&#128737;','&#128125;','&#129302;','&#128123;','&#129330;','&#128520;','&#129351;','&#128081;'];
const G_TYPES=['Spiral','Elliptical','Irregular','Barred Spiral','Lenticular','Dwarf'];
const NA=['Andromeda','Orion','Cygnus','Lyra','Perseus','Aquila','Vega','Rigel','Sirius','Altair','Deneb','Arcturus','Spica','Antares','Aldebaran','Pollux','Castor','Regulus','Elnath','Mirach'];
const NB=['Nexus','Prime','Deep','Core','Reach','Fringe','Expanse','Void','Drift','Surge','Pulse','Echo','Shadow','Blaze','Storm','Edge','Haven','Sanctum','Domain','Empire'];
const COLS=[[100,180,255],[255,220,140],[170,100,255],[80,255,160],[255,150,80],[200,200,255]];

// Universe size
const UW=2800, UH=2200;

// ════ STATE ════
let CV=null, CTX=null, MC=null, MCTX=null;
let W=0, H=0;
let galaxies=[];
let homeIdx=0;
let selG=null;
// Camera
let camX=0, camY=0, camS=0.4;
// Drag state - kept minimal to avoid glitch
let isDrag=false, dragStartX=0, dragStartY=0, camStartX=0, camStartY=0;
let hasMoved=false;
let raf=null;

// ════ UTILS ════
const $=id=>document.getElementById(id);
function setLoad(p,t){$('lbar').style.width=p+'%';$('ltxt').textContent=t;}
function toast(m,type='inf'){
  const el=document.createElement('div');
  el.className='toast '+type;el.textContent=m;
  $('toasts').appendChild(el);
  setTimeout(()=>el.remove(),3200);
}
function fmt(n){if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return''+n;}

// ════ SEEDED RNG ════
function mkRng(seed){
  let s=Math.abs(seed)%2147483647||1;
  return()=>{s=s*16807%2147483647;return(s-1)/2147483646;};
}
function hashStr(str){let h=5381;for(let i=0;i<str.length;i++)h=(h*33^str.charCodeAt(i))>>>0;return h;}

// ════ BUILD GALAXIES ════
function buildGalaxies(seed){
  const rng=mkRng(seed);
  const list=[];
  const N=230;
  const MIN_DIST=65;
  let tries=0;
  while(list.length<N && tries<N*25){
    tries++;
    const x=80+rng()*(UW-160);
    const y=80+rng()*(UH-160);
    let ok=true;
    for(const g of list){if(Math.hypot(g.x-x,g.y-y)<MIN_DIST){ok=false;break;}}
    if(!ok)continue;
    const ti=Math.floor(rng()*G_TYPES.length);
    const c=COLS[ti];
    list.push({
      id:list.length, x, y,
      sz:16+rng()*20,
      name:NA[Math.floor(rng()*NA.length)]+' '+NB[Math.floor(rng()*NB.length)],
      type:G_TYPES[ti],
      sys:290+Math.floor(rng()*100),
      cr:c[0],cg:c[1],cb:c[2],
      arms:(ti===0||ti===3)?2+Math.floor(rng()*2):0,
      rot:rng()*Math.PI*2,
      rspd:(rng()-.5)*.0003,
      twink:rng()*Math.PI*2,
      bright:.5+rng()*.5,
      explored:false, isHome:false,
    });
  }
  return list;
}

// ════ CAMERA HELPERS ════
// Convert world→screen
function w2s(wx,wy){return{x:Math.round(wx*camS+camX),y:Math.round(wy*camS+camY)};}
// Convert screen→world
function s2w(sx,sy){return{x:(sx-camX)/camS,y:(sy-camY)/camS};}

function clampScale(){camS=Math.max(0.1,Math.min(3.5,camS));}

function fitView(){
  if(!CV)return;
  const pad=40;
  const availW=W-pad*2;
  const availH=H-50-44-pad*2; // minus HUD and bottom bar
  camS=Math.min(availW/UW,availH/UH);
  clampScale();
  camX=(W-UW*camS)/2;
  camY=50+(availH+pad*2-UH*camS)/2; // center in available area below HUD
}

function centerOnHome(){
  if(!galaxies.length)return;
  const g=galaxies[homeIdx];
  // Center home galaxy in middle of screen
  camX=W/2-g.x*camS;
  camY=H/2-g.y*camS;
}

// ════ DRAW ════
function draw(ts){
  if(!CTX)return;
  CTX.setTransform(1,0,0,1,0,0);
  CTX.clearRect(0,0,W,H);
  CTX.fillStyle='#00010a';
  CTX.fillRect(0,0,W,H);

  // Subtle nebula
  const nb=CTX.createRadialGradient(W*.25,H*.3,0,W*.25,H*.3,W*.35);
  nb.addColorStop(0,'rgba(124,58,237,0.06)');nb.addColorStop(1,'transparent');
  CTX.fillStyle=nb;CTX.fillRect(0,0,W,H);
  const nb2=CTX.createRadialGradient(W*.75,H*.65,0,W*.75,H*.65,W*.3);
  nb2.addColorStop(0,'rgba(0,229,255,0.04)');nb2.addColorStop(1,'transparent');
  CTX.fillStyle=nb2;CTX.fillRect(0,0,W,H);

  CTX.save();
  CTX.translate(camX,camY);
  CTX.scale(camS,camS);

  // Connection lines (explored only)
  if(camS>0.2){
    for(let i=0;i<galaxies.length;i++){
      const a=galaxies[i];
      if(!a.explored&&!a.isHome)continue;
      for(let j=i+1;j<galaxies.length;j++){
        const b=galaxies[j];
        if(!b.explored&&!b.isHome)continue;
        const d=Math.hypot(a.x-b.x,a.y-b.y);
        if(d>300)continue;
        CTX.beginPath();
        CTX.moveTo(a.x,a.y);CTX.lineTo(b.x,b.y);
        CTX.strokeStyle=`rgba(0,229,255,${.05*(1-d/300)})`;
        CTX.lineWidth=0.7/camS;
        CTX.stroke();
      }
    }
  }

  // Draw galaxies
  const t=ts||0;
  for(const g of galaxies) drawGalaxy(g,t);

  CTX.restore();

  // Update zoom display
  $('bzoom').textContent=camS.toFixed(2)+'x';

  // Minimap
  drawMini();
}

function drawGalaxy(g,ts){
  const p=.5+.5*Math.sin(ts*.001+g.twink);
  const s=g.sz;

  CTX.save();
  CTX.translate(g.x,g.y);

  if(!g.explored&&!g.isHome){
    // UNKNOWN — faint glow only
    const grd=CTX.createRadialGradient(0,0,0,0,0,s*1.8);
    grd.addColorStop(0,`rgba(140,140,180,${.08+p*.05})`);
    grd.addColorStop(1,'transparent');
    CTX.fillStyle=grd;
    CTX.beginPath();CTX.arc(0,0,s*1.8,0,Math.PI*2);CTX.fill();
    // Tiny core
    CTX.beginPath();CTX.arc(0,0,s*.3,0,Math.PI*2);
    CTX.fillStyle=`rgba(160,160,200,${.15+p*.08})`;
    CTX.fill();
  } else {
    // KNOWN — full render
    const col=`${g.cr},${g.cg},${g.cb}`;
    const ga=.4+p*.25;

    // Halo
    const halo=CTX.createRadialGradient(0,0,0,0,0,s*2.8);
    halo.addColorStop(0,`rgba(${col},${ga*.45})`);
    halo.addColorStop(.5,`rgba(${col},${ga*.15})`);
    halo.addColorStop(1,'transparent');
    CTX.fillStyle=halo;
    CTX.beginPath();CTX.arc(0,0,s*2.8,0,Math.PI*2);CTX.fill();

    // Main glow
    const glow=CTX.createRadialGradient(0,0,0,0,0,s*1.6);
    glow.addColorStop(0,`rgba(${col},${ga*.9})`);
    glow.addColorStop(.6,`rgba(${col},${ga*.35})`);
    glow.addColorStop(1,'transparent');
    CTX.fillStyle=glow;
    CTX.beginPath();CTX.arc(0,0,s*1.6,0,Math.PI*2);CTX.fill();

    // Bright core
    const core=CTX.createRadialGradient(0,0,0,0,0,s*.5);
    core.addColorStop(0,`rgba(255,255,255,${g.bright*.9})`);
    core.addColorStop(.35,`rgba(${col},${g.bright*.75})`);
    core.addColorStop(1,'transparent');
    CTX.fillStyle=core;
    CTX.beginPath();CTX.arc(0,0,s*.5,0,Math.PI*2);CTX.fill();

    // Spiral arms
    if(g.arms>0){
      CTX.save();
      CTX.rotate(g.rot+ts*g.rspd);
      for(let arm=0;arm<g.arms;arm++){
        CTX.save();
        CTX.rotate((Math.PI*2/g.arms)*arm);
        for(let i=0;i<16;i++){
          const f=i/16;
          const a=f*Math.PI*1.6;
          const r=s*.28+f*s*.82;
          CTX.beginPath();
          CTX.arc(Math.cos(a)*r,Math.sin(a)*r,(1-f)*s*.15+.4,0,Math.PI*2);
          CTX.fillStyle=`rgba(${col},${g.bright*(.5-f*.3)})`;
          CTX.fill();
        }
        CTX.restore();
      }
      CTX.restore();
    }

    // Star sparkles
    for(let i=0;i<5;i++){
      const a=(i/5)*Math.PI*2+g.rot;
      const r=s*(.2+Math.abs(Math.sin(i*2.1))*.4);
      CTX.beginPath();
      CTX.arc(Math.cos(a)*r,Math.sin(a)*r,s*.05,0,Math.PI*2);
      CTX.fillStyle=`rgba(255,255,255,${g.bright*.55})`;
      CTX.fill();
    }
  }

  // HOME gold ring
  if(g.isHome){
    CTX.beginPath();CTX.arc(0,0,s*2,0,Math.PI*2);
    CTX.strokeStyle=`rgba(255,196,0,${.4+p*.28})`;
    CTX.lineWidth=2/camS;CTX.stroke();
    CTX.beginPath();CTX.arc(0,0,s*2.6,0,Math.PI*2);
    CTX.strokeStyle=`rgba(255,196,0,${.14+p*.1})`;
    CTX.lineWidth=.8/camS;CTX.stroke();
  }

  // SELECTED ring
  if(selG&&selG.id===g.id){
    CTX.beginPath();CTX.arc(0,0,s*1.8,0,Math.PI*2);
    CTX.strokeStyle=`rgba(255,255,255,${.55+p*.3})`;
    CTX.lineWidth=1.5/camS;CTX.stroke();
    CTX.setLineDash([4/camS,3/camS]);
    CTX.beginPath();CTX.arc(0,0,s*2.3,0,Math.PI*2);
    CTX.strokeStyle=`rgba(255,255,255,${.2+p*.12})`;
    CTX.lineWidth=.7/camS;CTX.stroke();
    CTX.setLineDash([]);
  }

  // Label
  if(camS>.4&&(g.explored||g.isHome)){
    CTX.textAlign='center';CTX.textBaseline='top';
    const fs=Math.min(13,11/camS);
    CTX.font=`bold ${fs}px Orbitron,monospace`;
    CTX.fillStyle=g.isHome?`rgba(255,196,0,${.8+p*.2})`:`rgba(255,255,255,${.55+p*.15})`;
    CTX.fillText(g.name,0,s*1.2+4/camS);
  }

  CTX.restore();
}

function drawMini(){
  if(!MCTX)return;
  const MW=120,MH=92;
  MCTX.clearRect(0,0,MW,MH);
  MCTX.fillStyle='rgba(0,1,10,0.94)';MCTX.fillRect(0,0,MW,MH);
  const sx=MW/UW,sy=MH/UH;
  for(const g of galaxies){
    MCTX.beginPath();
    MCTX.arc(g.x*sx,g.y*sy,g.isHome?3:1.6,0,Math.PI*2);
    if(g.isHome)MCTX.fillStyle='rgba(255,196,0,0.95)';
    else if(g.explored)MCTX.fillStyle=`rgba(${g.cr},${g.cg},${g.cb},0.7)`;
    else MCTX.fillStyle='rgba(90,90,110,0.22)';
    MCTX.fill();
  }
  // Viewport box
  const vx=(-camX/camS)*sx;
  const vy=(-camY/camS)*sy;
  const vw=(W/camS)*sx;
  const vh=(H/camS)*sy;
  MCTX.strokeStyle='rgba(0,229,255,0.5)';
  MCTX.lineWidth=1;
  MCTX.strokeRect(vx,vy,vw,vh);
}

// ════ GALAXY HIT TEST ════
function galaxyAt(wx,wy){
  let best=null,bd=Infinity;
  const minHit=30/camS;
  for(const g of galaxies){
    const d=Math.hypot(g.x-wx,g.y-wy);
    const hit=Math.max(g.sz*2.5,minHit);
    if(d<hit&&d<bd){bd=d;best=g;}
  }
  return best;
}

// ════ TOOLTIP ════
function showTip(g,sx,sy){
  const tip=$('gtip');
  if(!g){tip.style.display='none';return;}
  $('gtn').textContent=g.name;
  $('gtt').textContent=g.type+' Galaxy';
  $('gts').textContent=(g.explored||g.isHome)?g.sys+' Solar Systems':'??? Solar Systems';
  const st=$('gtst');
  if(g.isHome){st.textContent='HOME GALAXY';st.className='gtst h';}
  else if(g.explored){st.textContent='EXPLORED';st.className='gtst e';}
  else{st.textContent='UNKNOWN';st.className='gtst u';}
  tip.style.display='block';
  tip.style.left=Math.min(sx+16,W-210)+'px';
  tip.style.top=Math.max(58,Math.min(sy-20,H-130))+'px';
}

// ════ CLICK / TAP ════
function onTap(sx,sy){
  const w=s2w(sx,sy);
  const g=galaxyAt(w.x,w.y);
  if(g){
    selG=g;
    $('eprompt').style.display='block';
    $('eprompt').textContent=(g.isHome?'HOME: ':'ENTER: ')+g.name.toUpperCase();
    showTip(g,sx,sy);
    toast(g.name+(g.isHome?' — Your home galaxy':(g.explored?' — Explored':' — Unknown territory')),'inf');
  } else {
    selG=null;
    $('eprompt').style.display='none';
    $('gtip').style.display='none';
  }
}

window.enterGalaxy=function(){
  if(!selG)return;
  $('ztrans').classList.add('show');
  setTimeout(()=>{
    selG.explored=true;
    // Save galaxy data for galaxy view
    sessionStorage.setItem('vd_galaxy', JSON.stringify({
      id: selG.id,
      name: selG.name,
      type: selG.type,
      cr: selG.cr, cg: selG.cg, cb: selG.cb,
      systemCount: selG.sys,
      seed: (selG.id+1)*7919,
      isHome: selG.isHome,
    }));
    $('eprompt').style.display='none';
    window.location.href='galaxy.html';
  },600);
};

// ════ INPUT SETUP ════
function setupInput(){
  // ── MOUSE ──
  CV.addEventListener('mousedown',e=>{
    if(e.button!==0)return;
    isDrag=true;hasMoved=false;
    dragStartX=e.clientX;dragStartY=e.clientY;
    camStartX=camX;camStartY=camY;
    e.preventDefault();
  });
  window.addEventListener('mousemove',e=>{
    if(!isDrag){
      // Hover tooltip
      const w=s2w(e.clientX,e.clientY);
      showTip(galaxyAt(w.x,w.y),e.clientX,e.clientY);
      return;
    }
    const dx=e.clientX-dragStartX;
    const dy=e.clientY-dragStartY;
    if(Math.abs(dx)+Math.abs(dy)>3)hasMoved=true;
    camX=camStartX+dx;
    camY=camStartY+dy;
    e.preventDefault();
  });
  window.addEventListener('mouseup',e=>{
    if(!isDrag)return;
    isDrag=false;
    if(!hasMoved)onTap(e.clientX,e.clientY);
  });

  // ── TOUCH ──
  let t0=null; // first touch start point
  CV.addEventListener('touchstart',e=>{
    e.preventDefault();
    if(e.touches.length===1){
      isDrag=true;hasMoved=false;
      t0={x:e.touches[0].clientX,y:e.touches[0].clientY};
      dragStartX=e.touches[0].clientX;dragStartY=e.touches[0].clientY;
      camStartX=camX;camStartY=camY;
    } else {
      isDrag=false;t0=null;
    }
  },{passive:false});

  CV.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(!isDrag||e.touches.length!==1)return;
    const dx=e.touches[0].clientX-dragStartX;
    const dy=e.touches[0].clientY-dragStartY;
    if(Math.abs(dx)+Math.abs(dy)>4)hasMoved=true;
    camX=camStartX+dx;
    camY=camStartY+dy;
  },{passive:false});

  CV.addEventListener('touchend',e=>{
    e.preventDefault();
    if(!isDrag)return;
    isDrag=false;
    if(!hasMoved&&e.changedTouches.length===1&&t0){
      onTap(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
    }
    t0=null;
  },{passive:false});

  CV.addEventListener('touchcancel',e=>{
    e.preventDefault();
    isDrag=false;t0=null;
  },{passive:false});

  // ── ZOOM BUTTONS ──
  $('zbtn-in').addEventListener('click',()=>zoom(1.3));
  $('zbtn-out').addEventListener('click',()=>zoom(0.77));
  $('zbtn-fit').addEventListener('click',()=>{
    fitView();
    // Center on home after fit
    const hg=galaxies[homeIdx];
    if(hg){
      camX=W/2-hg.x*camS;
      camY=H/2-hg.y*camS;
    }
  });
}

function zoom(factor){
  const cx=W/2,cy=H/2;
  const wx=(cx-camX)/camS,wy=(cy-camY)/camS;
  camS*=factor;
  clampScale();
  camX=cx-wx*camS;
  camY=cy-wy*camS;
}

// ════ RESIZE ════
function resize(){
  W=window.innerWidth;
  H=window.innerHeight;
  CV.width=W;CV.height=H;
  MC.width=120;MC.height=92;
}

// ════ RENDER LOOP ════
function startLoop(){
  if(raf)return;
  function loop(ts){
    raf=requestAnimationFrame(loop);
    draw(ts);
  }
  raf=requestAnimationFrame(loop);
}

// ════ LOGOUT ════
window.goHome=function(){
  const zt=document.getElementById('zt');
  if(zt){zt.classList.add('show');}
  setTimeout(()=>window.location.href='game.html',500);
};
window.doLogout=async function(){
  if(!confirm('Logout from Void Dominion?'))return;
  await SB.auth.signOut();
  window.location.href='https://amitmukherjee626-rgb.github.io/void-dominion/';
};

// ════ MAIN INIT ════
async function init(){
  setLoad(10,'Connecting...');
  await delay(150);

  // Auth check
  setLoad(25,'Authenticating...');
  let session=null;
  try{
    const r=await SB.auth.getSession();
    session=r.data.session;
  }catch(e){}
  if(!session?.user){
    window.location.href='https://amitmukherjee626-rgb.github.io/void-dominion/';
    return;
  }

  // Profile
  setLoad(40,'Loading profile...');
  await delay(100);
  const {data:prof}=await SB.from('players').select('*').eq('id',session.user.id).maybeSingle();

  // Update HUD
  const ai=(prof?.avatar_id||1)-1;
  $('hav').innerHTML=AVATARS[Math.min(ai,AVATARS.length-1)];
  $('hname').textContent=prof?.username||'Commander';
  $('htag').textContent=prof?.player_tag||'#VD-00000';
  $('hcr').textContent=fmt(prof?.credits||0);
  $('hmn').textContent=fmt(prof?.minerals||0);
  $('hen').textContent=fmt(prof?.energy||0);

  // Generate universe
  setLoad(60,'Generating universe...');
  await delay(100);
  const seed=hashStr(session.user.id);
  galaxies=buildGalaxies(seed);

  // Set home galaxy
  setLoad(78,'Locating home system...');
  await delay(100);
  homeIdx=((seed%galaxies.length)+galaxies.length)%galaxies.length;
  galaxies[homeIdx].isHome=true;
  galaxies[homeIdx].explored=true;

  // Explore a few nearby galaxies
  let ex=0;
  for(const g of galaxies){
    if(g.id===homeIdx)continue;
    const hg=galaxies[homeIdx];
    if(Math.hypot(g.x-hg.x,g.y-hg.y)<260&&ex<5){g.explored=true;ex++;}
  }

  // Canvas init
  setLoad(90,'Rendering...');
  CV=document.getElementById('cv');
  CTX=CV.getContext('2d');
  MC=document.getElementById('mmc');
  MCTX=MC.getContext('2d');

  // MUST set W,H before any camera calculation
  W=window.innerWidth;
  H=window.innerHeight;
  CV.width=W; CV.height=H;
  MC.width=120; MC.height=92;
  window.addEventListener('resize',()=>{
    W=window.innerWidth; H=window.innerHeight;
    CV.width=W; CV.height=H;
  });

  // Now camera calculation will be correct
  const hg=galaxies[homeIdx];
  // Use a good starting zoom - fit whole universe
  const pad=50;
  camS=Math.min((W-pad*2)/UW,(H-100)/UH)*0.9;
  clampScale();
  // Center exactly on home galaxy
  camX=W/2-hg.x*camS;
  camY=H/2-hg.y*camS;

  setupInput();
  setLoad(100,'Ready!');
  await delay(300);

  // Hide loading
  const ls=$('loadscr');
  ls.style.transition='opacity 0.4s';
  ls.style.opacity='0';
  setTimeout(()=>ls.style.display='none',450);

  startLoop();
  toast('Welcome '+(prof?.username||'Commander')+'! Gold ring = Home Galaxy','ok');
}

function delay(ms){return new Promise(r=>setTimeout(r,ms));}
init();
</script>
