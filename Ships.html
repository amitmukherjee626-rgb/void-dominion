<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID DOMINION — Ship Icons Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#00010a;color:#d0eeff;font-family:'Exo 2',sans-serif;min-height:100vh;padding:16px;}
h1{font-family:'Orbitron',monospace;font-size:18px;color:#00e5ff;letter-spacing:3px;text-align:center;margin-bottom:4px;}
.sub{font-size:10px;letter-spacing:3px;color:rgba(0,229,255,0.4);text-align:center;margin-bottom:20px;text-transform:uppercase;}

.ctrl{background:rgba(0,5,20,0.9);border:1px solid rgba(0,229,255,0.2);border-radius:4px;padding:14px;margin-bottom:16px;}
.btn{padding:10px 20px;font-family:'Orbitron',monospace;font-size:10px;letter-spacing:2px;background:linear-gradient(90deg,rgba(0,200,230,.9),rgba(124,58,237,.9));color:#fff;border:none;border-radius:3px;cursor:pointer;text-transform:uppercase;margin:4px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn.danger{background:linear-gradient(90deg,rgba(255,23,68,.8),rgba(180,0,40,.8));}
.btn.green{background:linear-gradient(90deg,rgba(0,180,80,.9),rgba(0,120,60,.9));}

#status{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:1px;color:rgba(0,229,255,0.6);margin:8px 0;min-height:16px;}
#progress{height:4px;background:rgba(0,229,255,0.1);border-radius:2px;margin:8px 0;overflow:hidden;}
#prog-fill{height:100%;width:0%;background:linear-gradient(90deg,#00e5ff,#7c3aed);transition:width .3s;}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:20px;}
.ship-item{background:rgba(0,5,20,0.88);border:1px solid rgba(0,229,255,0.15);border-radius:4px;padding:12px;text-align:center;transition:border-color .2s;}
.ship-item.done{border-color:rgba(0,230,118,0.4);}
.ship-item.error{border-color:rgba(255,23,68,0.4);}
.ship-item.loading{border-color:rgba(255,196,0,0.5);animation:pulse 1s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
.ship-icon-wrap{width:64px;height:64px;margin:0 auto 8px;border:1px solid rgba(0,229,255,0.1);border-radius:4px;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.ship-icon-wrap img{width:100%;height:100%;object-fit:contain;}
.ship-icon-wrap svg{width:100%;height:100%;}
.ship-name{font-family:'Orbitron',monospace;font-size:9px;font-weight:700;color:#fff;letter-spacing:1px;margin-bottom:2px;}
.ship-role{font-size:8px;color:rgba(0,229,255,0.4);letter-spacing:1px;text-transform:uppercase;}
.ship-status{font-size:7px;color:rgba(255,255,255,0.3);margin-top:4px;font-family:'Orbitron',monospace;}

.copy-section{background:rgba(0,5,20,0.9);border:1px solid rgba(0,229,255,0.2);border-radius:4px;padding:14px;margin-top:16px;}
.copy-title{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;color:rgba(0,229,255,0.5);text-transform:uppercase;margin-bottom:10px;}
textarea{width:100%;height:200px;background:rgba(0,0,0,0.5);border:1px solid rgba(0,229,255,0.2);border-radius:3px;color:#00e5ff;font-family:monospace;font-size:10px;padding:8px;resize:vertical;outline:none;}
</style>
</head>
<body>

<h1>SHIP ICON GENERATOR</h1>
<div class="sub">Claude AI — Top-Down Spaceship SVGs</div>

<div class="ctrl">
  <div id="status">Ready to generate ship icons...</div>
  <div id="progress"><div id="prog-fill"></div></div>
  <div style="display:flex;gap:6px;flex-wrap:wrap;">
    <button class="btn" id="btn-gen" onclick="generateAll()">GENERATE ALL ICONS</button>
    <button class="btn danger" id="btn-stop" onclick="stopGen()" style="display:none;">STOP</button>
    <button class="btn green" id="btn-copy" onclick="copyIcons()" style="display:none;">COPY ICONS JS</button>
  </div>
</div>

<div class="grid" id="ship-grid"></div>

<div class="copy-section" id="copy-section" style="display:none;">
  <div class="copy-title">Generated Icons JS — Copy into fleet.html</div>
  <textarea id="icons-output" readonly placeholder="Generated icons will appear here..."></textarea>
  <button class="btn" onclick="copyText()" style="margin-top:8px;">COPY TO CLIPBOARD</button>
</div>

<script>
const SHIPS = [
  {id:'probe',       name:'Probe',           role:'Stealth Scout',       color:'#9b5cf6', prompt:'A top-down view SVG of a small diamond-shaped stealth probe spacecraft. Purple/violet color scheme. Four sensor arrays extending from the body like a compass. Small glowing core in center. Dark space background. Simple clean lines, military sci-fi style. 48x48 viewbox.'},
  {id:'colonizer',   name:'Colonizer',        role:'Planet Colonization', color:'#00e5ff', prompt:'A top-down view SVG of a wide-body colonizer transport ship. Cyan/teal color scheme. Hexagonal hull, prominent cargo bay in center, two small thruster pods on sides, landing struts visible. Simple clean sci-fi style. 48x48 viewbox.'},
  {id:'light_carrier',name:'Light Carrier',  role:'Fleet Transport',     color:'#ffc400', prompt:'A top-down view SVG of a small aircraft carrier spacecraft. Gold/yellow color scheme. Flat rectangular flight deck with 2 runway lines, small bridge tower offset to one side, two engine pods at rear. Military sci-fi style. 48x48 viewbox.'},
  {id:'fleet_carrier',name:'Fleet Carrier',  role:'Massive Transport',   color:'#ffd700', prompt:'A top-down view SVG of a massive fleet carrier spacecraft. Bright gold color scheme. Very wide flat hull, three parallel runway lanes on deck, large bridge tower, three engine banks at rear. Imposing military sci-fi style. 48x48 viewbox.'},
  {id:'collector',   name:'Garbage Collector',role:'Resource Salvage',   color:'#00e676', prompt:'A top-down view SVG of a salvage ship with extending mechanical arms. Green color scheme. Round central body, four articulated collector arms reaching outward with claw tips, central glowing core. Industrial sci-fi style. 48x48 viewbox.'},
  {id:'fighter',     name:'Fighter',          role:'Fast Attack',        color:'#ff4444', prompt:'A top-down view SVG of a small fast fighter spacecraft. Red color scheme. Sharp delta wing design, pointed nose, small cockpit bubble, two wing-mounted laser cannons, engine exhaust at rear. Aggressive military sci-fi style. 48x48 viewbox.'},
  {id:'gunship',     name:'Gunship',          role:'Heavy Fighter',      color:'#ff6600', prompt:'A top-down view SVG of a medium gunship spacecraft. Orange/red color scheme. Wider delta wing than fighter, reinforced hull plating, twin plasma cannons under wings, bulkier engine section. Military sci-fi style. 48x48 viewbox.'},
  {id:'destroyer',   name:'Destroyer',        role:'Anti-Fighter',       color:'#0088ff', prompt:'A top-down view SVG of a destroyer warship spacecraft. Blue color scheme. Long narrow hull, multiple rapid-fire turret emplacements along sides, two long railgun barrels extending forward, prominent engine section. Military sci-fi style. 48x48 viewbox.'},
  {id:'frigate',     name:'Frigate',          role:'Balanced Warship',   color:'#4488ff', prompt:'A top-down view SVG of a frigate warship spacecraft. Blue-white color scheme. Medium-length hull with angular armor plates, two side-mounted weapons pods, bridge tower, dual engine exhausts. Balanced military sci-fi style. 48x48 viewbox.'},
  {id:'cruiser',     name:'Cruiser',          role:'Heavy Warship',      color:'#8866ff', prompt:'A top-down view SVG of a heavy cruiser warship spacecraft. Purple-blue color scheme. Wide armored hull, four heavy gun turrets (two front, two rear), thick armor plating, large bridge section, triple engine exhausts. Heavy military sci-fi style. 48x48 viewbox.'},
  {id:'battleship',  name:'Battleship',       role:'Siege Specialist',   color:'#ff2244', prompt:'A top-down view SVG of a battleship spacecraft. Dark red color scheme. Massive heavily armored hull, two enormous siege cannon barrels pointing forward, heavy turrets on sides, reinforced plating, large engine bank. Intimidating military sci-fi style. 48x48 viewbox.'},
  {id:'dreadnought', name:'Dreadnought',      role:'Fleet Killer',       color:'#ff4400', prompt:'A top-down view SVG of a dreadnought capital ship spacecraft. Orange-red color scheme. Enormous hull, multiple weapons emplacements all around, central mass driver cannon array, thick layered armor plating, four engine clusters. Overwhelming military sci-fi style. 48x48 viewbox.'},
  {id:'leviathan',   name:'Leviathan',        role:'Planet Destroyer',   color:'#cc00ff', prompt:'A top-down view SVG of a leviathan class planet destroyer spacecraft. Deep purple color scheme. Colossal irregular hull, single massive ion annihilator cannon running full length of ship, spines and weapon arrays bristling from all surfaces, multiple engine arrays. Ultimate sci-fi warship style. 48x48 viewbox.'},
];

let generated = {};
let stopFlag = false;
let currentAbort = null;

// Init grid
function initGrid(){
  const grid = document.getElementById('ship-grid');
  grid.innerHTML = SHIPS.map(s => `
    <div class="ship-item" id="item-${s.id}">
      <div class="ship-icon-wrap" id="icon-${s.id}">
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <circle cx="24" cy="24" r="8" fill="none" stroke="${s.color}" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>
          <text x="24" y="28" text-anchor="middle" font-size="10" fill="${s.color}" opacity="0.5">?</text>
        </svg>
      </div>
      <div class="ship-name">${s.name}</div>
      <div class="ship-role">${s.role}</div>
      <div class="ship-status" id="status-${s.id}">Pending</div>
    </div>
  `).join('');
}

async function generateAll(){
  stopFlag = false;
  document.getElementById('btn-gen').disabled = true;
  document.getElementById('btn-stop').style.display = 'inline-block';
  document.getElementById('copy-section').style.display = 'none';
  document.getElementById('btn-copy').style.display = 'none';

  let done = 0;
  for(const ship of SHIPS){
    if(stopFlag) break;
    setStatus(`Generating ${ship.name}... (${done+1}/${SHIPS.length})`);
    setProgress((done/SHIPS.length)*100);
    setItemLoading(ship.id);
    try {
      const svg = await generateShipSVG(ship);
      if(svg && !stopFlag){
        generated[ship.id] = svg;
        setItemDone(ship.id, svg);
        done++;
        setProgress((done/SHIPS.length)*100);
      }
    } catch(e){
      setItemError(ship.id, e.message);
      console.error(ship.id, e);
    }
    // Small delay between API calls
    if(!stopFlag) await delay(800);
  }

  document.getElementById('btn-gen').disabled = false;
  document.getElementById('btn-stop').style.display = 'none';
  
  if(Object.keys(generated).length > 0){
    setStatus(`Done! ${Object.keys(generated).length}/${SHIPS.length} icons generated.`);
    document.getElementById('btn-copy').style.display = 'inline-block';
    document.getElementById('copy-section').style.display = 'block';
    buildOutput();
  } else {
    setStatus('Generation stopped or failed.');
  }
  setProgress(100);
}

async function generateShipSVG(ship){
  const prompt = `Create a detailed SVG top-down view of a ${ship.name} spacecraft for a space strategy game.

STYLE: Military sci-fi, similar to Astro Empires game art style. Top-down (bird's eye) view.
COLOR: Primary color ${ship.color}. Dark background fills, colored outlines and details.
SHIP TYPE: ${ship.role}

REQUIREMENTS:
- SVG with viewBox="0 0 48 48"
- Top-down perspective (looking down from above)
- Ship facing UPWARD (nose at top, engines at bottom)
- Dark hull fills (very dark, almost black)
- Colored stroke lines for detail (${ship.color})
- Show: hull shape, cockpit/bridge, weapons, engines
- Simple clean lines, NO gradients needed
- ${ship.prompt}

CRITICAL: Return ONLY the raw SVG code. Start with <svg and end with </svg>. No markdown, no explanation, no backticks.`;

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{role: 'user', content: prompt}]
    })
  });

  if(!response.ok){
    const err = await response.text();
    throw new Error(`API error: ${response.status}`);
  }

  const data = await response.json();
  let svg = data.content[0].text.trim();
  
  // Clean up - extract SVG if wrapped
  if(svg.includes('```')) svg = svg.replace(/```svg?|```/g, '').trim();
  if(!svg.startsWith('<svg')) {
    const match = svg.match(/<svg[\s\S]*<\/svg>/);
    if(match) svg = match[0];
  }
  
  // Ensure proper viewBox
  if(!svg.includes('viewBox')) svg = svg.replace('<svg', '<svg viewBox="0 0 48 48"');
  
  return svg;
}

function stopGen(){ stopFlag = true; }

function setItemLoading(id){
  const item = document.getElementById('item-'+id);
  if(item){ item.className = 'ship-item loading'; document.getElementById('status-'+id).textContent = 'Generating...'; }
}
function setItemDone(id, svg){
  const item = document.getElementById('item-'+id);
  if(item) item.className = 'ship-item done';
  const wrap = document.getElementById('icon-'+id);
  if(wrap) wrap.innerHTML = svg;
  const st = document.getElementById('status-'+id);
  if(st) st.textContent = 'Done ✓';
}
function setItemError(id, msg){
  const item = document.getElementById('item-'+id);
  if(item) item.className = 'ship-item error';
  const st = document.getElementById('status-'+id);
  if(st) st.textContent = 'Error';
}
function setStatus(t){ document.getElementById('status').textContent = t; }
function setProgress(p){ document.getElementById('prog-fill').style.width = p + '%'; }
function delay(ms){ return new Promise(r => setTimeout(r, ms)); }

function buildOutput(){
  // Build JS object with SVG strings
  let js = 'const SHIP_ICONS = {\n';
  for(const ship of SHIPS){
    if(generated[ship.id]){
      // Encode as data URI
      const b64 = btoa(unescape(encodeURIComponent(generated[ship.id])));
      js += `  '${ship.id}': 'data:image/svg+xml;base64,${b64}',\n`;
    }
  }
  js += '};\n';
  document.getElementById('icons-output').value = js;
}

function copyIcons(){ 
  buildOutput();
  document.getElementById('copy-section').style.display = 'block';
}
function copyText(){
  const ta = document.getElementById('icons-output');
  ta.select();
  document.execCommand('copy');
  setStatus('Copied to clipboard!');
}

initGrid();
</script>
</body>
</html>
